<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a" id="themeColor">
<title>Curriculum — Daniel Kiani</title>
<meta name="robots" content="noindex, nofollow">

<!-- Favicon -->
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">

<!-- Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --font: 'JetBrains Mono', monospace;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
    --sidebar-w: 320px;
  }

  [data-theme="dark"] {
    --bg: #0a0a0a;
    --fg: #d4d4d4;
    --muted: #525252;
    --dim: #3a3a3a;
    --border: #1f1f1f;
    --accent: #a0a0a0;
    --hover: #ffffff;
    --panel-bg: #111111;
    --panel-border: #1e1e1e;
    --center-fill: #e85d2a;
    --item-hover: #181818;
    --code-bg: #161616;
    --progress-bg: #1a1a1a;
    --check-bg: #1a2e1a;
    --check-border: #2d5a2d;
    --check-fill: #4ade80;
  }

  [data-theme="light"] {
    --bg: #f0ede8;
    --fg: #1a1a1a;
    --muted: #8a8a8a;
    --dim: #b0aca6;
    --border: #ddd9d4;
    --accent: #555;
    --hover: #000000;
    --panel-bg: #ffffff;
    --panel-border: #e5e2dd;
    --center-fill: #e85d2a;
    --item-hover: #f7f5f2;
    --code-bg: #e8e5e0;
    --progress-bg: #e5e2dd;
    --check-bg: #e8f5e8;
    --check-border: #a3d9a3;
    --check-fill: #22c55e;
  }

  html {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    transition: background 0.5s var(--ease), color 0.5s var(--ease);
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
  }

  ::selection { background: rgba(128,128,128,0.15); }

  /* ─── Layout ─── */
  .layout {
    display: flex;
    height: 100%;
    position: relative;
  }

  /* ─── Sidebar ─── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    height: 100%;
    background: var(--panel-bg);
    border-right: 1px solid var(--panel-border);
    display: flex;
    flex-direction: column;
    position: fixed;
    left: 0;
    top: 0;
    z-index: 20;
    transition: transform 0.4s var(--ease);
  }

  .sidebar-header {
    padding: 1.5rem 1.25rem 1rem;
    border-bottom: 1px solid var(--panel-border);
    flex-shrink: 0;
  }

  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
    color: var(--fg);
    margin-bottom: 1rem;
  }

  .sidebar-brand span {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .sidebar-brand .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--center-fill);
    flex-shrink: 0;
  }

  /* Progress bar */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--progress-bg);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--center-fill);
    border-radius: 2px;
    transition: width 0.5s var(--ease);
    width: 0%;
  }

  .progress-label {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    min-width: 32px;
    text-align: right;
  }

  /* Nav modules */
  .sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 0.75rem 0;
    scrollbar-width: thin;
    scrollbar-color: var(--dim) transparent;
  }

  .sidebar-nav::-webkit-scrollbar { width: 4px; }
  .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  .module-group {
    margin-bottom: 0.25rem;
  }

  .module-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1.25rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    color: var(--fg);
    font-family: var(--font);
  }

  .module-header:hover {
    background: var(--item-hover);
  }

  .module-header.locked {
    cursor: default;
    opacity: 0.4;
  }

  .module-header.locked:hover {
    background: none;
  }

  .module-number {
    font-size: 10px;
    color: var(--muted);
    min-width: 20px;
  }

  .module-title {
    font-size: 12px;
    font-weight: 500;
    flex: 1;
  }

  .module-lock-icon {
    width: 12px;
    height: 12px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .module-chevron {
    width: 14px;
    height: 14px;
    color: var(--muted);
    transition: transform 0.25s var(--ease);
    flex-shrink: 0;
  }

  .module-group.open .module-chevron {
    transform: rotate(90deg);
  }

  .module-lessons {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s var(--ease);
  }

  .module-group.open .module-lessons {
    max-height: 800px;
  }

  .lesson-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1.25rem 0.5rem 2.75rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    color: var(--accent);
    font-family: var(--font);
    font-size: 11px;
    font-weight: 300;
    line-height: 1.5;
  }

  .lesson-item:hover {
    background: var(--item-hover);
    color: var(--hover);
  }

  .lesson-item.active {
    color: var(--hover);
    background: var(--item-hover);
  }

  .lesson-check {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid var(--dim);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s var(--ease);
  }

  .lesson-item.completed .lesson-check {
    background: var(--check-bg);
    border-color: var(--check-border);
  }

  .lesson-item.completed .lesson-check::after {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--check-fill);
  }

  .lesson-label {
    flex: 1;
  }

  /* Sidebar footer */
  .sidebar-footer {
    padding: 1rem 1.25rem;
    border-top: 1px solid var(--panel-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .sidebar-footer a {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .sidebar-footer a:hover {
    color: var(--hover);
  }

  .theme-btn {
    font-family: var(--font);
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.3rem 0.6rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }

  .theme-btn:hover {
    color: var(--hover);
    border-color: var(--accent);
  }

  /* ─── Main Content ─── */
  .main {
    flex: 1;
    margin-left: var(--sidebar-w);
    height: 100%;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--dim) transparent;
  }

  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }

  .content-wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 3rem 2.5rem 6rem;
  }

  /* Lesson header */
  .lesson-header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .lesson-breadcrumb {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .lesson-title {
    font-size: 24px;
    font-weight: 500;
    line-height: 1.3;
    letter-spacing: -0.01em;
  }

  .lesson-meta {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-top: 0.75rem;
    font-size: 11px;
    color: var(--muted);
  }

  .lesson-meta span {
    display: flex;
    align-items: center;
    gap: 0.35rem;
  }

  /* Content typography */
  .lesson-body h2 {
    font-size: 16px;
    font-weight: 500;
    margin: 2rem 0 0.75rem;
    letter-spacing: -0.01em;
  }

  .lesson-body h3 {
    font-size: 14px;
    font-weight: 500;
    margin: 1.5rem 0 0.5rem;
    color: var(--fg);
  }

  .lesson-body p {
    font-size: 13px;
    font-weight: 300;
    line-height: 1.85;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  .lesson-body ul, .lesson-body ol {
    padding-left: 1.25rem;
    margin-bottom: 1rem;
  }

  .lesson-body li {
    font-size: 13px;
    font-weight: 300;
    line-height: 1.85;
    color: var(--accent);
    margin-bottom: 0.25rem;
  }

  .lesson-body strong {
    font-weight: 500;
    color: var(--fg);
  }

  .lesson-body em {
    font-style: italic;
    color: var(--fg);
  }

  .lesson-body a {
    color: var(--center-fill);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .lesson-body a:hover {
    border-bottom-color: var(--center-fill);
  }

  /* Code blocks */
  .lesson-body code {
    font-family: var(--font);
    font-size: 12px;
    background: var(--code-bg);
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
  }

  .lesson-body pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.25rem;
    overflow-x: auto;
  }

  .lesson-body pre code {
    background: none;
    padding: 0;
    font-size: 12px;
    line-height: 1.7;
  }

  /* Callout boxes */
  .callout {
    border-left: 3px solid var(--center-fill);
    background: var(--code-bg);
    padding: 1rem 1.25rem;
    margin: 1.25rem 0;
    border-radius: 0 3px 3px 0;
  }

  .callout-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--center-fill);
    margin-bottom: 0.4rem;
  }

  .callout p {
    margin-bottom: 0;
  }

  .callout.info {
    border-left-color: #3b82f6;
  }

  .callout.info .callout-label {
    color: #3b82f6;
  }

  .callout.warning {
    border-left-color: #eab308;
  }

  .callout.warning .callout-label {
    color: #eab308;
  }

  /* Step list */
  .steps {
    counter-reset: step;
    margin: 1rem 0 1.5rem;
  }

  .step {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.25rem;
    align-items: flex-start;
  }

  .step::before {
    counter-increment: step;
    content: counter(step);
    font-size: 11px;
    font-weight: 500;
    color: var(--center-fill);
    background: var(--code-bg);
    border: 1px solid var(--border);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 0.1rem;
  }

  .step-content {
    flex: 1;
  }

  .step-content p {
    margin-bottom: 0.5rem;
  }

  /* Image placeholders */
  .lesson-img {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 3px;
    margin: 1rem 0 1.5rem;
    background: var(--code-bg);
    display: block;
  }

  .img-placeholder {
    width: 100%;
    height: 240px;
    border: 1px dashed var(--border);
    border-radius: 3px;
    margin: 1rem 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 12px;
    background: var(--code-bg);
    text-align: center;
    padding: 1rem;
  }

  /* Video embed */
  .video-wrap {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    margin: 1rem 0 1.5rem;
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--code-bg);
  }

  .video-wrap iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  .video-placeholder {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    color: var(--muted);
    font-size: 12px;
  }

  .video-placeholder svg {
    width: 32px;
    height: 32px;
    opacity: 0.4;
  }

  /* Lesson nav footer */
  .lesson-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    gap: 1rem;
  }

  .lesson-nav-btn {
    font-family: var(--font);
    font-size: 12px;
    font-weight: 400;
    color: var(--accent);
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
  }

  .lesson-nav-btn:hover {
    color: var(--hover);
    border-color: var(--accent);
    background: var(--item-hover);
  }

  .lesson-nav-btn.primary {
    background: var(--center-fill);
    color: #fff;
    border-color: var(--center-fill);
  }

  .lesson-nav-btn.primary:hover {
    opacity: 0.9;
  }

  .complete-btn {
    font-family: var(--font);
    font-size: 12px;
    font-weight: 400;
    color: var(--check-fill);
    background: var(--check-bg);
    border: 1px solid var(--check-border);
    border-radius: 3px;
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .complete-btn:hover {
    opacity: 0.85;
  }

  .complete-btn.is-completed {
    opacity: 0.6;
  }

  /* ─── Quiz Styles ─── */
  .quiz-container {
    margin-top: 2rem;
  }

  .quiz-section-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--center-fill);
    margin: 2rem 0 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .quiz-question {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }

  .quiz-question-text {
    font-size: 13px;
    font-weight: 400;
    line-height: 1.7;
    color: var(--fg);
    margin-bottom: 1rem;
  }

  .quiz-question-number {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .quiz-option {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 300;
    color: var(--accent);
    background: none;
    width: 100%;
    text-align: left;
    line-height: 1.6;
  }

  .quiz-option:hover {
    border-color: var(--accent);
    background: var(--item-hover);
  }

  .quiz-option.selected {
    border-color: var(--center-fill);
    background: var(--item-hover);
    color: var(--fg);
  }

  .quiz-option.correct {
    border-color: var(--check-fill);
    background: var(--check-bg);
  }

  .quiz-option.incorrect {
    border-color: #ef4444;
    background: rgba(239, 68, 68, 0.08);
  }

  .quiz-option-letter {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    margin-top: 1px;
  }

  .quiz-option.selected .quiz-option-letter {
    border-color: var(--center-fill);
    color: var(--center-fill);
  }

  .quiz-option.correct .quiz-option-letter {
    border-color: var(--check-fill);
    color: var(--check-fill);
    background: var(--check-bg);
  }

  .quiz-option.incorrect .quiz-option-letter {
    border-color: #ef4444;
    color: #ef4444;
  }

  .quiz-explanation {
    margin-top: 0.75rem;
    padding: 0.75rem 1rem;
    background: var(--item-hover);
    border-radius: 3px;
    font-size: 12px;
    font-weight: 300;
    line-height: 1.7;
    color: var(--accent);
    display: none;
  }

  .quiz-explanation.visible {
    display: block;
  }

  .quiz-chart-placeholder {
    width: 100%;
    height: 200px;
    border: 1px dashed var(--border);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 12px;
    background: var(--code-bg);
    margin-bottom: 1rem;
  }

  .quiz-open-response {
    width: 100%;
    min-height: 80px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.75rem 1rem;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 300;
    color: var(--fg);
    resize: vertical;
    line-height: 1.7;
  }

  .quiz-open-response:focus {
    outline: none;
    border-color: var(--center-fill);
  }

  .quiz-submit-btn {
    font-family: var(--font);
    font-size: 12px;
    font-weight: 400;
    background: var(--center-fill);
    color: #fff;
    border: 1px solid var(--center-fill);
    border-radius: 3px;
    padding: 0.75rem 1.5rem;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 1.5rem;
  }

  .quiz-submit-btn:hover {
    opacity: 0.9;
  }

  .quiz-submit-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .quiz-results {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1.5rem;
    margin-top: 1.5rem;
    text-align: center;
  }

  .quiz-score {
    font-size: 32px;
    font-weight: 500;
    color: var(--fg);
    margin-bottom: 0.5rem;
  }

  .quiz-score.passing {
    color: var(--check-fill);
  }

  .quiz-score.failing {
    color: #ef4444;
  }

  .quiz-results-text {
    font-size: 13px;
    font-weight: 300;
    color: var(--accent);
    line-height: 1.7;
  }

  .quiz-retry-btn {
    font-family: var(--font);
    font-size: 12px;
    font-weight: 400;
    color: var(--accent);
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    margin-top: 1rem;
  }

  .quiz-retry-btn:hover {
    color: var(--hover);
    border-color: var(--accent);
  }

  /* ─── Locked Module Page ─── */
  .locked-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 40vh;
    text-align: center;
    color: var(--muted);
  }

  .locked-content svg {
    width: 48px;
    height: 48px;
    margin-bottom: 1.5rem;
    opacity: 0.3;
  }

  .locked-content h2 {
    font-size: 18px;
    font-weight: 500;
    color: var(--fg);
    margin-bottom: 0.75rem;
  }

  .locked-content p {
    font-size: 13px;
    font-weight: 300;
    line-height: 1.7;
    color: var(--muted);
    max-width: 400px;
  }

  /* ─── Mobile Hamburger ─── */
  .hamburger {
    display: none;
    position: fixed;
    top: 1rem;
    left: 1rem;
    z-index: 30;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 3px;
    width: 40px;
    height: 40px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .hamburger svg {
    width: 18px;
    height: 18px;
    color: var(--fg);
  }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 15;
  }

  /* ─── Responsive ─── */
  @media (max-width: 900px) {
    :root {
      --sidebar-w: 280px;
    }

    .hamburger {
      display: flex;
    }

    .sidebar {
      transform: translateX(-100%);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-overlay.open {
      display: block;
    }

    .main {
      margin-left: 0;
    }

    .content-wrap {
      padding: 4rem 1.25rem 4rem;
    }

    .lesson-title {
      font-size: 20px;
    }
  }

  @media (max-width: 500px) {
    .content-wrap {
      padding: 4rem 1rem 3rem;
    }

    .lesson-nav {
      flex-direction: column;
    }

    .lesson-nav-btn {
      width: 100%;
      justify-content: center;
    }
  }

  /* ─── Transitions ─── */
  .fade-in {
    animation: fadeIn 0.4s var(--ease) both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── Keyboard hint ─── */
  .kbd-hint {
    position: fixed;
    bottom: 1.25rem;
    right: 1.5rem;
    font-size: 10px;
    color: var(--dim);
    display: flex;
    gap: 0.75rem;
    z-index: 5;
  }

  .kbd-hint kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 20px;
    height: 20px;
    padding: 0 4px;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: var(--font);
    font-size: 10px;
    color: var(--muted);
    margin-right: 3px;
  }

  @media (max-width: 900px) {
    .kbd-hint { display: none; }
  }
</style>
</head>
