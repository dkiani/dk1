<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a" id="themeColor">
<title>Curriculum — Daniel Kiani</title>
<meta name="robots" content="noindex, nofollow">

<!-- Favicon -->
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">

<!-- Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --font: 'JetBrains Mono', monospace;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
    --sidebar-w: 320px;
  }

  [data-theme="dark"] {
    --bg: #0a0a0a;
    --fg: #d4d4d4;
    --muted: #525252;
    --dim: #3a3a3a;
    --border: #1f1f1f;
    --accent: #a0a0a0;
    --hover: #ffffff;
    --panel-bg: #111111;
    --panel-border: #1e1e1e;
    --center-fill: #e85d2a;
    --item-hover: #181818;
    --code-bg: #161616;
    --progress-bg: #1a1a1a;
    --check-bg: #1a2e1a;
    --check-border: #2d5a2d;
    --check-fill: #4ade80;
  }

  [data-theme="light"] {
    --bg: #f0ede8;
    --fg: #1a1a1a;
    --muted: #8a8a8a;
    --dim: #b0aca6;
    --border: #ddd9d4;
    --accent: #555;
    --hover: #000000;
    --panel-bg: #ffffff;
    --panel-border: #e5e2dd;
    --center-fill: #e85d2a;
    --item-hover: #f7f5f2;
    --code-bg: #e8e5e0;
    --progress-bg: #e5e2dd;
    --check-bg: #e8f5e8;
    --check-border: #a3d9a3;
    --check-fill: #22c55e;
  }

  html {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    transition: background 0.5s var(--ease), color 0.5s var(--ease);
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
  }

  ::selection { background: rgba(128,128,128,0.15); }

  /* ─── Layout ─── */
  .layout {
    display: flex;
    height: 100%;
    position: relative;
  }

  /* ─── Sidebar ─── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    height: 100%;
    background: var(--panel-bg);
    border-right: 1px solid var(--panel-border);
    display: flex;
    flex-direction: column;
    position: fixed;
    left: 0;
    top: 0;
    z-index: 20;
    transition: transform 0.4s var(--ease);
  }

  .sidebar-header {
    padding: 1.5rem 1.25rem 1rem;
    border-bottom: 1px solid var(--panel-border);
    flex-shrink: 0;
  }

  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
    color: var(--fg);
    margin-bottom: 1rem;
  }

  .sidebar-brand span {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .sidebar-brand .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--center-fill);
    flex-shrink: 0;
  }

  /* Progress bar */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--progress-bg);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--center-fill);
    border-radius: 2px;
    transition: width 0.5s var(--ease);
    width: 0%;
  }

  .progress-label {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    min-width: 32px;
    text-align: right;
  }

  /* Nav modules */
  .sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 0.75rem 0;
    scrollbar-width: thin;
    scrollbar-color: var(--dim) transparent;
  }

  .sidebar-nav::-webkit-scrollbar { width: 4px; }
  .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  .module-group {
    margin-bottom: 0.25rem;
  }

  .module-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1.25rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    color: var(--fg);
    font-family: var(--font);
  }

  .module-header:hover {
    background: var(--item-hover);
  }

  .module-number {
    font-size: 10px;
    color: var(--muted);
    min-width: 20px;
  }

  .module-title {
    font-size: 12px;
    font-weight: 500;
    flex: 1;
  }

  .module-chevron {
    width: 14px;
    height: 14px;
    color: var(--muted);
    transition: transform 0.25s var(--ease);
    flex-shrink: 0;
  }

  .module-group.open .module-chevron {
    transform: rotate(90deg);
  }

  .module-lessons {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s var(--ease);
  }

  .module-group.open .module-lessons {
    max-height: 500px;
  }

  .lesson-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1.25rem 0.5rem 2.75rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    color: var(--accent);
    font-family: var(--font);
    font-size: 11px;
    font-weight: 300;
    line-height: 1.5;
  }

  .lesson-item:hover {
    background: var(--item-hover);
    color: var(--hover);
  }

  .lesson-item.active {
    color: var(--hover);
    background: var(--item-hover);
  }

  .lesson-check {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid var(--dim);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s var(--ease);
  }

  .lesson-item.completed .lesson-check {
    background: var(--check-bg);
    border-color: var(--check-border);
  }

  .lesson-item.completed .lesson-check::after {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--check-fill);
  }

  .lesson-label {
    flex: 1;
  }

  /* Sidebar footer */
  .sidebar-footer {
    padding: 1rem 1.25rem;
    border-top: 1px solid var(--panel-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .sidebar-footer a {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .sidebar-footer a:hover {
    color: var(--hover);
  }

  .theme-btn {
    font-family: var(--font);
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.3rem 0.6rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }

  .theme-btn:hover {
    color: var(--hover);
    border-color: var(--accent);
  }

  /* ─── Main Content ─── */
  .main {
    flex: 1;
    margin-left: var(--sidebar-w);
    height: 100%;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--dim) transparent;
  }

  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }

  .content-wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 3rem 2.5rem 6rem;
  }

  /* Lesson header */
  .lesson-header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .lesson-breadcrumb {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .lesson-title {
    font-size: 24px;
    font-weight: 500;
    line-height: 1.3;
    letter-spacing: -0.01em;
  }

  .lesson-meta {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-top: 0.75rem;
    font-size: 11px;
    color: var(--muted);
  }

  .lesson-meta span {
    display: flex;
    align-items: center;
    gap: 0.35rem;
  }

  /* Content typography */
  .lesson-body h2 {
    font-size: 16px;
    font-weight: 500;
    margin: 2rem 0 0.75rem;
    letter-spacing: -0.01em;
  }

  .lesson-body h3 {
    font-size: 14px;
    font-weight: 500;
    margin: 1.5rem 0 0.5rem;
    color: var(--fg);
  }

  .lesson-body p {
    font-size: 13px;
    font-weight: 300;
    line-height: 1.85;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  .lesson-body ul, .lesson-body ol {
    padding-left: 1.25rem;
    margin-bottom: 1rem;
  }

  .lesson-body li {
    font-size: 13px;
    font-weight: 300;
    line-height: 1.85;
    color: var(--accent);
    margin-bottom: 0.25rem;
  }

  .lesson-body strong {
    font-weight: 500;
    color: var(--fg);
  }

  .lesson-body em {
    font-style: italic;
    color: var(--fg);
  }

  .lesson-body a {
    color: var(--center-fill);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .lesson-body a:hover {
    border-bottom-color: var(--center-fill);
  }

  /* Code blocks */
  .lesson-body code {
    font-family: var(--font);
    font-size: 12px;
    background: var(--code-bg);
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
  }

  .lesson-body pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.25rem;
    overflow-x: auto;
  }

  .lesson-body pre code {
    background: none;
    padding: 0;
    font-size: 12px;
    line-height: 1.7;
  }

  /* Callout boxes */
  .callout {
    border-left: 3px solid var(--center-fill);
    background: var(--code-bg);
    padding: 1rem 1.25rem;
    margin: 1.25rem 0;
    border-radius: 0 3px 3px 0;
  }

  .callout-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--center-fill);
    margin-bottom: 0.4rem;
  }

  .callout p {
    margin-bottom: 0;
  }

  .callout.info {
    border-left-color: #3b82f6;
  }

  .callout.info .callout-label {
    color: #3b82f6;
  }

  .callout.warning {
    border-left-color: #eab308;
  }

  .callout.warning .callout-label {
    color: #eab308;
  }

  /* Step list */
  .steps {
    counter-reset: step;
    margin: 1rem 0 1.5rem;
  }

  .step {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.25rem;
    align-items: flex-start;
  }

  .step::before {
    counter-increment: step;
    content: counter(step);
    font-size: 11px;
    font-weight: 500;
    color: var(--center-fill);
    background: var(--code-bg);
    border: 1px solid var(--border);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 0.1rem;
  }

  .step-content {
    flex: 1;
  }

  .step-content p {
    margin-bottom: 0.5rem;
  }

  /* Image placeholders */
  .lesson-img {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 3px;
    margin: 1rem 0 1.5rem;
    background: var(--code-bg);
    display: block;
  }

  .img-placeholder {
    width: 100%;
    height: 240px;
    border: 1px dashed var(--border);
    border-radius: 3px;
    margin: 1rem 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 12px;
    background: var(--code-bg);
  }

  /* Video embed */
  .video-wrap {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    margin: 1rem 0 1.5rem;
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--code-bg);
  }

  .video-wrap iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  .video-placeholder {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    color: var(--muted);
    font-size: 12px;
  }

  .video-placeholder svg {
    width: 32px;
    height: 32px;
    opacity: 0.4;
  }

  /* Lesson nav footer */
  .lesson-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    gap: 1rem;
  }

  .lesson-nav-btn {
    font-family: var(--font);
    font-size: 12px;
    font-weight: 400;
    color: var(--accent);
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
  }

  .lesson-nav-btn:hover {
    color: var(--hover);
    border-color: var(--accent);
    background: var(--item-hover);
  }

  .lesson-nav-btn.primary {
    background: var(--center-fill);
    color: #fff;
    border-color: var(--center-fill);
  }

  .lesson-nav-btn.primary:hover {
    opacity: 0.9;
  }

  .complete-btn {
    font-family: var(--font);
    font-size: 12px;
    font-weight: 400;
    color: var(--check-fill);
    background: var(--check-bg);
    border: 1px solid var(--check-border);
    border-radius: 3px;
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .complete-btn:hover {
    opacity: 0.85;
  }

  .complete-btn.is-completed {
    opacity: 0.6;
  }

  /* ─── Mobile Hamburger ─── */
  .hamburger {
    display: none;
    position: fixed;
    top: 1rem;
    left: 1rem;
    z-index: 30;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 3px;
    width: 40px;
    height: 40px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .hamburger svg {
    width: 18px;
    height: 18px;
    color: var(--fg);
  }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 15;
  }

  /* ─── Responsive ─── */
  @media (max-width: 900px) {
    :root {
      --sidebar-w: 280px;
    }

    .hamburger {
      display: flex;
    }

    .sidebar {
      transform: translateX(-100%);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-overlay.open {
      display: block;
    }

    .main {
      margin-left: 0;
    }

    .content-wrap {
      padding: 4rem 1.25rem 4rem;
    }

    .lesson-title {
      font-size: 20px;
    }
  }

  @media (max-width: 500px) {
    .content-wrap {
      padding: 4rem 1rem 3rem;
    }

    .lesson-nav {
      flex-direction: column;
    }

    .lesson-nav-btn {
      width: 100%;
      justify-content: center;
    }
  }

  /* ─── Transitions ─── */
  .fade-in {
    animation: fadeIn 0.4s var(--ease) both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── Keyboard hint ─── */
  .kbd-hint {
    position: fixed;
    bottom: 1.25rem;
    right: 1.5rem;
    font-size: 10px;
    color: var(--dim);
    display: flex;
    gap: 0.75rem;
    z-index: 5;
  }

  .kbd-hint kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 20px;
    height: 20px;
    padding: 0 4px;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: var(--font);
    font-size: 10px;
    color: var(--muted);
    margin-right: 3px;
  }

  @media (max-width: 900px) {
    .kbd-hint { display: none; }
  }
</style>
</head>
<body>

<!-- Mobile hamburger -->
<button class="hamburger" onclick="toggleSidebar()" aria-label="Toggle menu">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="7" x2="21" y2="7"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="17" x2="21" y2="17"/></svg>
</button>

<!-- Sidebar overlay for mobile -->
<div class="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="layout">

  <!-- ─── Sidebar ─── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/" class="sidebar-brand">
        <span class="dot"></span>
        <span>Curriculum</span>
      </a>
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-label" id="progressLabel">0%</span>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebarNav">
      <!-- Populated by JS -->
    </nav>

    <div class="sidebar-footer">
      <a href="/">kiani.vc</a>
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">Light</button>
    </div>
  </aside>

  <!-- ─── Main Content ─── -->
  <main class="main" id="mainContent">
    <div class="content-wrap" id="contentWrap">
      <!-- Populated by JS -->
    </div>
  </main>

</div>

<!-- Keyboard hints -->
<div class="kbd-hint">
  <span><kbd>&larr;</kbd> prev</span>
  <span><kbd>&rarr;</kbd> next</span>
  <span><kbd>e</kbd> complete</span>
</div>

<script>
// ─── Curriculum Data ───
const CURRICULUM = [
  {
    module: 'Getting Started',
    lessons: [
      {
        id: 'welcome',
        title: 'Welcome to the Program',
        time: '3 min',
        content: `
          <p>Welcome. If you're reading this, you've already taken the most important step — you showed up.</p>
          <p>This curriculum is designed to take you from <strong>zero to your first funded prop firm account</strong>. Every module builds on the last. Don't skip ahead. Trust the process.</p>

          <h2>What You'll Learn</h2>
          <ul>
            <li>How to set up a professional trading environment</li>
            <li>How to read price action and understand market structure</li>
            <li>How to use custom indicators to identify high-probability setups</li>
            <li>How to manage risk and protect your capital</li>
            <li>How to pass a prop firm challenge and get funded</li>
          </ul>

          <h2>How This Works</h2>
          <p>Each lesson is short and actionable. Read it, do it, mark it complete. The progress bar tracks your journey — aim for 100%.</p>

          <div class="callout">
            <div class="callout-label">Important</div>
            <p>This is not a get-rich-quick scheme. Trading is a skill that takes time to develop. The students who succeed are the ones who show up consistently and follow the system.</p>
          </div>

          <h2>Support</h2>
          <p>If you get stuck at any point, reach out in the community. You're not doing this alone.</p>
        `
      },
      {
        id: 'expectations',
        title: 'Setting Expectations',
        time: '4 min',
        content: `
          <p>Before we get into charts and indicators, let's get your mindset right. This is the part most people skip — and it's the reason most people fail.</p>

          <h2>The Reality of Trading</h2>
          <p>Here's the truth: <strong>most traders lose money</strong>. Not because trading is impossible, but because they approach it like gambling instead of treating it like a business.</p>
          <p>You are going to treat this differently. You'll follow a system. You'll manage risk. You'll journal your trades. You'll be patient.</p>

          <h2>Your Commitment</h2>
          <ul>
            <li><strong>Time:</strong> Dedicate at least 1-2 hours per day to learning and practice</li>

          <p>Before you can trade, you need to understand what you're looking at. Candlesticks are the language of the market. Let's learn to read them.</p>

          <h2>Anatomy of a Candlestick</h2>
          <p>Every candlestick tells you four things:</p>
          <ul>
            <li><strong>Open</strong> — where the price started for that time period</li>
            <li><strong>High</strong> — the highest price reached</li>
            <li><strong>Low</strong> — the lowest price reached</li>
            <li><strong>Close</strong> — where the price ended</li>
          </ul>

          <p>The thick part is called the <strong>body</strong>. The thin lines above and below are called <strong>wicks</strong> (or shadows).</p>

          <ul>
            <li><strong>Green candle</strong> = Close is higher than Open (bullish / price went up)</li>
            <li><strong>Red candle</strong> = Close is lower than Open (bearish / price went down)</li>
          </ul>

          <div class="img-placeholder">[ Diagram: Anatomy of bullish vs bearish candlestick — coming soon ]</div>

          <h2>What Wicks Tell You</h2>
          <p>Wicks are <em>rejection</em>. A long wick means price tried to go somewhere but got pushed back.</p>
          <ul>
            <li><strong>Long upper wick</strong> — sellers pushed price back down (bearish rejection)</li>
            <li><strong>Long lower wick</strong> — buyers pushed price back up (bullish rejection)</li>
            <li><strong>No/small wicks</strong> — strong conviction in the direction of the candle</li>
          </ul>

          <div class="callout">
            <div class="callout-label">Key Insight</div>
            <p>A candle with a big body and no wicks shows <strong>strength</strong>. A candle with a small body and long wicks shows <strong>indecision</strong>. Learn to see the difference.</p>
          </div>

          <h2>Important Candle Patterns</h2>
          <p>You don't need to memorize 50 patterns. Focus on these three:</p>
          <ul>
            <li><strong>Engulfing</strong> — a candle that completely covers the previous one. Shows a shift in control.</li>
            <li><strong>Pin bar / Hammer</strong> — small body, long wick in one direction. Shows rejection at a level.</li>
            <li><strong>Doji</strong> — open and close are nearly the same. Shows pure indecision.</li>
          </ul>
          <p>We'll see how these patterns play into our strategy in later modules.</p>
        `

          <p>Support and resistance are the most fundamental concepts in trading. If you understand nothing else, understand this: <strong>price respects levels</strong>.</p>

          <h2>What is Support?</h2>
          <p>Support is a price level where buying pressure has historically been strong enough to stop price from falling further. Think of it as a <strong>floor</strong>.</p>
          <p>When price approaches a support level, buyers step in, demand increases, and price bounces.</p>

          <h2>What is Resistance?</h2>
          <p>Resistance is a price level where selling pressure has historically been strong enough to stop price from rising further. Think of it as a <strong>ceiling</strong>.</p>
          <p>When price approaches a resistance level, sellers step in, supply increases, and price drops.</p>

          <div class="callout">
            <div class="callout-label">The Golden Rule</div>
            <p>When support breaks, it becomes resistance. When resistance breaks, it becomes support. This is called a <strong>flip</strong> — and it's one of the most reliable patterns in all of trading.</p>
          </div>

          <h2>How to Draw Levels</h2>
          <div class="steps">
            <div class="step">
              <div class="step-content">
                <p>Zoom out to the <strong>Daily or 4H</strong> timeframe. You want to see the big picture.</p>
              </div>
            </div>
            <div class="step">
              <div class="step-content">
                <p>Look for areas where price has <strong>bounced multiple times</strong>. The more touches, the stronger the level.</p>
              </div>
            </div>
            <div class="step">
              <div class="step-content">
                <p>Draw a <strong>horizontal line</strong> at these areas. Use the Ray tool in TradingView (shortcut: <code>Alt+H</code>).</p>
              </div>
            </div>
            <div class="step">
              <div class="step-content">
                <p>Think of levels as <strong>zones, not exact prices</strong>. Use a range rather than a single line. Price rarely respects an exact number.</p>
              </div>
            </div>

          <p>Market structure is the backbone of everything we do. It tells you who's in control — buyers or sellers — and where the market is likely to go next.</p>

          <h2>Higher Highs & Higher Lows (Uptrend)</h2>
          <p>An uptrend is defined by a series of <strong>higher highs (HH)</strong> and <strong>higher lows (HL)</strong>. Each swing high is higher than the last, and each pullback holds above the previous low.</p>
          <p>In an uptrend, we look for <strong>long (buy) entries</strong> at pullbacks to higher lows.</p>

          <h2>Lower Highs & Lower Lows (Downtrend)</h2>
          <p>A downtrend is defined by a series of <strong>lower highs (LH)</strong> and <strong>lower lows (LL)</strong>. Each swing high is lower than the last, and each bounce fails to reach the previous high.</p>
          <p>In a downtrend, we look for <strong>short (sell) entries</strong> at pullbacks to lower highs.</p>

          <div class="callout">
            <div class="callout-label">The #1 Rule</div>
            <p><strong>Trade with the trend.</strong> You can fight the trend and occasionally win, but the odds are always against you. Our strategy is simple: identify the trend on the higher timeframe, then find entries on the lower timeframe in that direction.</p>
          </div>

          <h2>Break of Structure (BOS)</h2>
          <p>A <strong>break of structure</strong> happens when price breaks a previous swing high (in an uptrend) or swing low (in a downtrend). This confirms the trend is continuing.</p>

          <h2>Change of Character (CHoCH)</h2>
          <p>A <strong>change of character</strong> happens when price breaks the <em>opposite</em> swing point. For example, in an uptrend, if price breaks below the most recent higher low, that's a CHoCH — a potential signal that the trend is reversing.</p>

          <div class="img-placeholder">[ Diagram: BOS vs CHoCH illustration — coming soon ]</div>

            <li>Wait for structure to align with your higher-timeframe bias</li>
            <li>Enter on confirmed structure (BOS) with proper risk management</li>
          </ol>

          <ul>

        content: `
          <p>You can have the best strategy in the world and still blow your account if you don't manage risk. <strong>Risk management is not optional.</strong> It's the single most important skill in trading.</p>

          <h2>The 1% Rule</h2>
          <p>Never risk more than <strong>1% of your account</strong> on a single trade. Period.</p>
          <p>If you have a $100,000 prop firm account, your maximum loss per trade is $1,000. This means:</p>
          <ul>
            <li>If your stop loss is 20 points on NQ, you trade 1 contract ($20/point × 50 points max loss = $1,000)</li>
            <li>If your stop loss is 10 points, you can trade 2 contracts</li>
            <li>The tighter the stop, the more contracts you can trade — but never exceed 1% total risk</li>
          </ul>

          <div class="callout">
            <div class="callout-label">Why 1%?</div>
            <p>At 1% risk per trade, you'd need <strong>100 consecutive losing trades</strong> to blow your account. That's nearly impossible with a real strategy. At 5% risk, you only need 20. At 10%, just 10. The math is simple — smaller risk = longer survival = more opportunities to win.</p>
          </div>

          <h2>Risk-to-Reward Ratio</h2>
          <p>Every trade should have a minimum <strong>1:2 risk-to-reward ratio</strong>. This means for every $1 you risk, you target at least $2 in profit.</p>
          <p>Why? Because with a 1:2 R:R, you only need to win <strong>34% of your trades</strong> to be profitable. Even a coin flip (50%) makes you money at 1:2.</p>

          <h2>The Math That Changes Everything</h2>
          <p>Let's say you take 100 trades at 1% risk with a 1:2 R:R and a 45% win rate:</p>
          <ul>
            <li>45 winning trades × 2% gain = +90%</li>
            <li>55 losing trades × 1% loss = -55%</li>
            <li><strong>Net gain: +35%</strong> on your account</li>
          </ul>
          <p>You lose more often than you win — and you still make 35%. That's the power of risk management.</p>

          <h2>Rules to Live By</h2>
          <ol>
            <li><strong>Always set a stop loss</strong> before entering a trade. No exceptions.</li>
            <li><strong>Never move your stop loss further away</strong> from your entry. If it hits, it hits.</li>
            <li><strong>Never average down</strong> on a losing position.</li>
            <li><strong>Max 3 trades per day.</strong> If all 3 hit stop loss, you're done for the day.</li>
            <li><strong>Max 3% daily drawdown.</strong> If you lose 3% of your account in a day, stop trading.</li>
          </ol>

          <div class="callout warning">
            <div class="callout-label">Non-Negotiable</div>
            <p>These rules exist to protect you from yourself. Your worst enemy in trading isn't the market — it's your own emotions. Follow the rules even when you don't want to. <em>Especially</em> when you don't want to.</p>

// ─── State ───
let currentLesson = { module: 0, lesson: 0 };
let completedLessons = new Set();

// Load saved progress
try {
  const saved = localStorage.getItem('dk-curriculum-progress');
  if (saved) completedLessons = new Set(JSON.parse(saved));
  const savedPos = localStorage.getItem('dk-curriculum-position');
  if (savedPos) currentLesson = JSON.parse(savedPos);
} catch(e) {}

function saveProgress() {
  try {
    localStorage.setItem('dk-curriculum-progress', JSON.stringify([...completedLessons]));
    localStorage.setItem('dk-curriculum-position', JSON.stringify(currentLesson));
  } catch(e) {}
}

// ─── Count total lessons ───
function getTotalLessons() {
  return CURRICULUM.reduce((sum, m) => sum + m.lessons.length, 0);
}

function getLessonId(mi, li) {
  return CURRICULUM[mi].lessons[li].id;
}

function getFlatIndex(mi, li) {
  let idx = 0;
  for (let i = 0; i < mi; i++) idx += CURRICULUM[i].lessons.length;
  return idx + li;
}

function getPositionFromFlat(flat) {
  let count = 0;
  for (let mi = 0; mi < CURRICULUM.length; mi++) {
    for (let li = 0; li < CURRICULUM[mi].lessons.length; li++) {
      if (count === flat) return { module: mi, lesson: li };
      count++;
    }
  }
  return { module: 0, lesson: 0 };
}

// ─── Render Sidebar ───
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = CURRICULUM.map((mod, mi) => {
    const isOpen = mi === currentLesson.module;
    return `
      <div class="module-group${isOpen ? ' open' : ''}" data-module="${mi}">
        <button class="module-header" onclick="toggleModule(${mi})">
          <span class="module-number">${String(mi + 1).padStart(2, '0')}</span>
          <span class="module-title">${mod.module}</span>
          <svg class="module-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <div class="module-lessons">
          ${mod.lessons.map((lesson, li) => {
            const isActive = mi === currentLesson.module && li === currentLesson.lesson;
            const isCompleted = completedLessons.has(lesson.id);
            return `
              <button class="lesson-item${isActive ? ' active' : ''}${isCompleted ? ' completed' : ''}" onclick="goToLesson(${mi}, ${li})">
                <span class="lesson-check"></span>
                <span class="lesson-label">${lesson.title}</span>
              </button>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function toggleModule(mi) {
  const group = document.querySelector(`.module-group[data-module="${mi}"]`);
  if (group) group.classList.toggle('open');
}

// ─── Render Content ───
function renderContent() {
  const mod = CURRICULUM[currentLesson.module];
  const lesson = mod.lessons[currentLesson.lesson];
  const flat = getFlatIndex(currentLesson.module, currentLesson.lesson);
  const total = getTotalLessons();
  const isCompleted = completedLessons.has(lesson.id);

  const wrap = document.getElementById('contentWrap');
  wrap.innerHTML = `
    <div class="fade-in">
      <div class="lesson-header">
        <div class="lesson-breadcrumb">Module ${currentLesson.module + 1} — ${mod.module}</div>
        <h1 class="lesson-title">${lesson.title}</h1>
        <div class="lesson-meta">
          <span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${lesson.time} read
          </span>
          <span>Lesson ${flat + 1} of ${total}</span>
        </div>
      </div>

      <div class="lesson-body">
        ${lesson.content}
      </div>

      <div class="lesson-nav">
        ${flat > 0 ? `<button class="lesson-nav-btn" onclick="goToPrev()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          Previous
        </button>` : '<div></div>'}

        <button class="complete-btn${isCompleted ? ' is-completed' : ''}" onclick="toggleComplete()">
          ${isCompleted ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Completed` : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/></svg> Mark Complete`}
        </button>

        ${flat < total - 1 ? `<button class="lesson-nav-btn primary" onclick="goToNext()">
          Next
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>` : '<div></div>'}
      </div>
    </div>
  `;

  // Scroll main content to top
  document.getElementById('mainContent').scrollTo(0, 0);
}

// ─── Update Progress ───
function updateProgress() {
  const total = getTotalLessons();
  const done = completedLessons.size;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = pct + '%';
}

// ─── Navigation ───
function goToLesson(mi, li) {
  currentLesson = { module: mi, lesson: li };
  saveProgress();
  renderSidebar();
  renderContent();
  updateProgress();
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.querySelector('.sidebar-overlay').classList.remove('open');
}

function goToNext() {
  const flat = getFlatIndex(currentLesson.module, currentLesson.lesson);
  if (flat < getTotalLessons() - 1) {
    const pos = getPositionFromFlat(flat + 1);
    goToLesson(pos.module, pos.lesson);
  }
}

function goToPrev() {
  const flat = getFlatIndex(currentLesson.module, currentLesson.lesson);
  if (flat > 0) {
    const pos = getPositionFromFlat(flat - 1);
    goToLesson(pos.module, pos.lesson);
  }
}

function toggleComplete() {
  const id = getLessonId(currentLesson.module, currentLesson.lesson);
  if (completedLessons.has(id)) {
    completedLessons.delete(id);
  } else {
    completedLessons.add(id);
  }
  saveProgress();
  renderSidebar();
  renderContent();
  updateProgress();
}

// ─── Mobile Sidebar ───
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.querySelector('.sidebar-overlay').classList.toggle('open');
}

// ─── Theme Toggle ───
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.getElementById('themeColor').setAttribute('content', next === 'dark' ? '#0a0a0a' : '#f0ede8');
  document.getElementById('themeBtn').textContent = next === 'dark' ? 'Light' : 'Dark';
  try { localStorage.setItem('dk-curriculum-theme', next); } catch(e) {}
}

// Load saved theme
try {
  const savedTheme = localStorage.getItem('dk-curriculum-theme');
  if (savedTheme) {
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('themeColor').setAttribute('content', savedTheme === 'dark' ? '#0a0a0a' : '#f0ede8');
    document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? 'Light' : 'Dark';
  }
} catch(e) {}

// ─── Keyboard Nav ───
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === 'j') goToNext();
  if (e.key === 'ArrowLeft' || e.key === 'k') goToPrev();
  if (e.key === 'e') toggleComplete();
});

// ─── Init ───
renderSidebar();
renderContent();
updateProgress();
</script>
</body>
</html>
