<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a" id="themeColor">
<title>Curriculum — Daniel Kiani</title>
<meta name="robots" content="noindex, nofollow">

<!-- Favicon -->
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">

<!-- Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --font: 'JetBrains Mono', monospace;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
    --sidebar-w: 320px;
  }

  [data-theme="dark"] {
    --bg: #0a0a0a;
    --fg: #d4d4d4;
    --muted: #525252;
    --dim: #3a3a3a;
    --border: #1f1f1f;
    --accent: #a0a0a0;
    --hover: #ffffff;
    --panel-bg: #111111;
    --panel-border: #1e1e1e;
    --center-fill: #e85d2a;
    --item-hover: #181818;
    --code-bg: #161616;
    --progress-bg: #1a1a1a;
    --check-bg: #1a2e1a;
    --check-border: #2d5a2d;
    --check-fill: #4ade80;
  }

  [data-theme="light"] {
    --bg: #f0ede8;
    --fg: #1a1a1a;
    --muted: #8a8a8a;
    --dim: #b0aca6;
    --border: #ddd9d4;
    --accent: #555;
    --hover: #000000;
    --panel-bg: #ffffff;
    --panel-border: #e5e2dd;
    --center-fill: #e85d2a;
    --item-hover: #f7f5f2;
    --code-bg: #e8e5e0;
    --progress-bg: #e5e2dd;
    --check-bg: #e8f5e8;
    --check-border: #a3d9a3;
    --check-fill: #22c55e;
  }

  html {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    transition: background 0.5s var(--ease), color 0.5s var(--ease);
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
  }

  ::selection { background: rgba(128,128,128,0.15); }

  /* ─── Layout ─── */
  .layout {
    display: flex;
    height: 100%;
    position: relative;
  }

  /* ─── Sidebar ─── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    height: 100%;
    background: var(--panel-bg);
    border-right: 1px solid var(--panel-border);
    display: flex;
    flex-direction: column;
    position: fixed;
    left: 0;
    top: 0;
    z-index: 20;
    transition: transform 0.4s var(--ease);
  }

  .sidebar-header {
    padding: 1.5rem 1.25rem 1rem;
    border-bottom: 1px solid var(--panel-border);
    flex-shrink: 0;
  }

  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
    color: var(--fg);
    margin-bottom: 1rem;
  }

  .sidebar-brand span {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .sidebar-brand .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--center-fill);
    flex-shrink: 0;
  }

  /* Progress bar */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--progress-bg);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--center-fill);
    border-radius: 2px;
    transition: width 0.5s var(--ease);
    width: 0%;
  }

  .progress-label {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    min-width: 32px;
    text-align: right;
  }

  /* Nav modules */
  .sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 0.75rem 0;
    scrollbar-width: thin;
    scrollbar-color: var(--dim) transparent;
  }

  .sidebar-nav::-webkit-scrollbar { width: 4px; }
  .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  .module-group {
    margin-bottom: 0.25rem;
  }

  .module-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1.25rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    color: var(--fg);
    font-family: var(--font);
  }

  .module-header:hover {
    background: var(--item-hover);
  }

  .module-header.locked {
    cursor: default;
    opacity: 0.4;
  }

  .module-header.locked:hover {
    background: none;
  }

  .module-number {
    font-size: 10px;
    color: var(--muted);
    min-width: 20px;
  }

  .module-title {
    font-size: 12px;
    font-weight: 500;
    flex: 1;
  }

  .module-lock-icon {
    width: 12px;
    height: 12px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .module-chevron {
    width: 14px;
    height: 14px;
    color: var(--muted);
    transition: transform 0.25s var(--ease);
    flex-shrink: 0;
  }

  .module-group.open .module-chevron {
    transform: rotate(90deg);
  }

  .module-lessons {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s var(--ease);
  }

  .module-group.open .module-lessons {
    max-height: 800px;
  }

  .lesson-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1.25rem 0.5rem 2.75rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    color: var(--accent);
    font-family: var(--font);
    font-size: 11px;
    font-weight: 300;
    line-height: 1.5;
  }

  .lesson-item:hover {
    background: var(--item-hover);
    color: var(--hover);
  }

  .lesson-item.active {
    color: var(--hover);
    background: var(--item-hover);
  }

  .lesson-check {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid var(--dim);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s var(--ease);
  }

  .lesson-item.completed .lesson-check {
    background: var(--check-bg);
    border-color: var(--check-border);
  }

  .lesson-item.completed .lesson-check::after {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--check-fill);
  }

  .lesson-label {
    flex: 1;
  }

  /* Sidebar footer */
  .sidebar-footer {
    padding: 1rem 1.25rem;
    border-top: 1px solid var(--panel-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .sidebar-footer a {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .sidebar-footer a:hover {
    color: var(--hover);
  }

  .theme-btn {
    font-family: var(--font);
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.3rem 0.6rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }

  .theme-btn:hover {
    color: var(--hover);
    border-color: var(--accent);
  }

  /* ─── Main Content ─── */
  .main {
    flex: 1;
    margin-left: var(--sidebar-w);
    height: 100%;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--dim) transparent;
  }

  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }

  .content-wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 3rem 2.5rem 6rem;
  }

  /* Lesson header */
  .lesson-header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .lesson-breadcrumb {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .lesson-title {
    font-size: 24px;
    font-weight: 500;
    line-height: 1.3;
    letter-spacing: -0.01em;
  }

  .lesson-meta {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-top: 0.75rem;
    font-size: 11px;
    color: var(--muted);
  }

  .lesson-meta span {
    display: flex;
    align-items: center;
    gap: 0.35rem;
  }

  /* Content typography */
  .lesson-body h2 {
    font-size: 16px;
    font-weight: 500;
    margin: 2rem 0 0.75rem;
    letter-spacing: -0.01em;
  }

  .lesson-body h3 {
    font-size: 14px;
    font-weight: 500;
    margin: 1.5rem 0 0.5rem;
    color: var(--fg);
  }

  .lesson-body p {
    font-size: 13px;
    font-weight: 300;
    line-height: 1.85;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  .lesson-body ul, .lesson-body ol {
    padding-left: 1.25rem;
    margin-bottom: 1rem;
  }

  .lesson-body li {
    font-size: 13px;
    font-weight: 300;
    line-height: 1.85;
    color: var(--accent);
    margin-bottom: 0.25rem;
  }

  .lesson-body strong {
    font-weight: 500;
    color: var(--fg);
  }

  .lesson-body em {
    font-style: italic;
    color: var(--fg);
  }

  .lesson-body a {
    color: var(--center-fill);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .lesson-body a:hover {
    border-bottom-color: var(--center-fill);
  }

  /* Code blocks */
  .lesson-body code {
    font-family: var(--font);
    font-size: 12px;
    background: var(--code-bg);
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
  }

  .lesson-body pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.25rem;
    overflow-x: auto;
  }

  .lesson-body pre code {
    background: none;
    padding: 0;
    font-size: 12px;
    line-height: 1.7;
  }

  /* Callout boxes */
  .callout {
    border-left: 3px solid var(--center-fill);
    background: var(--code-bg);
    padding: 1rem 1.25rem;
    margin: 1.25rem 0;
    border-radius: 0 3px 3px 0;
  }

  .callout-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--center-fill);
    margin-bottom: 0.4rem;
  }

  .callout p {
    margin-bottom: 0;
  }

  .callout.info {
    border-left-color: #3b82f6;
  }

  .callout.info .callout-label {
    color: #3b82f6;
  }

  .callout.warning {
    border-left-color: #eab308;
  }

  .callout.warning .callout-label {
    color: #eab308;
  }

  /* Step list */
  .steps {
    counter-reset: step;
    margin: 1rem 0 1.5rem;
  }

  .step {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.25rem;
    align-items: flex-start;
  }

  .step::before {
    counter-increment: step;
    content: counter(step);
    font-size: 11px;
    font-weight: 500;
    color: var(--center-fill);
    background: var(--code-bg);
    border: 1px solid var(--border);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 0.1rem;
  }

  .step-content {
    flex: 1;
  }

  .step-content p {
    margin-bottom: 0.5rem;
  }

  /* Image placeholders */
  .lesson-img {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 3px;
    margin: 1rem 0 1.5rem;
    background: var(--code-bg);
    display: block;
  }

  .img-placeholder {
    width: 100%;
    height: 240px;
    border: 1px dashed var(--border);
    border-radius: 3px;
    margin: 1rem 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 12px;
    background: var(--code-bg);
    text-align: center;
    padding: 1rem;
  }

  /* Video embed */
  .video-wrap {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    margin: 1rem 0 1.5rem;
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--code-bg);
  }

  .video-wrap iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  .video-placeholder {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    color: var(--muted);
    font-size: 12px;
  }

  .video-placeholder svg {
    width: 32px;
    height: 32px;
    opacity: 0.4;
  }

  /* Lesson nav footer */
  .lesson-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    gap: 1rem;
  }

  .lesson-nav-btn {
    font-family: var(--font);
    font-size: 12px;
    font-weight: 400;
    color: var(--accent);
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
  }

  .lesson-nav-btn:hover {
    color: var(--hover);
    border-color: var(--accent);
    background: var(--item-hover);
  }

  .lesson-nav-btn.primary {
    background: var(--center-fill);
    color: #fff;
    border-color: var(--center-fill);
  }

  .lesson-nav-btn.primary:hover {
    opacity: 0.9;
  }

  .complete-btn {
    font-family: var(--font);
    font-size: 12px;
    font-weight: 400;
    color: var(--check-fill);
    background: var(--check-bg);
    border: 1px solid var(--check-border);
    border-radius: 3px;
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .complete-btn:hover {
    opacity: 0.85;
  }

  .complete-btn.is-completed {
    opacity: 0.6;
  }

  /* ─── Quiz Styles ─── */
  .quiz-container {
    margin-top: 2rem;
  }

  .quiz-section-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--center-fill);
    margin: 2rem 0 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .quiz-question {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }

  .quiz-question-text {
    font-size: 13px;
    font-weight: 400;
    line-height: 1.7;
    color: var(--fg);
    margin-bottom: 1rem;
  }

  .quiz-question-number {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .quiz-option {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 300;
    color: var(--accent);
    background: none;
    width: 100%;
    text-align: left;
    line-height: 1.6;
  }

  .quiz-option:hover {
    border-color: var(--accent);
    background: var(--item-hover);
  }

  .quiz-option.selected {
    border-color: var(--center-fill);
    background: var(--item-hover);
    color: var(--fg);
  }

  .quiz-option.correct {
    border-color: var(--check-fill);
    background: var(--check-bg);
  }

  .quiz-option.incorrect {
    border-color: #ef4444;
    background: rgba(239, 68, 68, 0.08);
  }

  .quiz-option-letter {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    margin-top: 1px;
  }

  .quiz-option.selected .quiz-option-letter {
    border-color: var(--center-fill);
    color: var(--center-fill);
  }

  .quiz-option.correct .quiz-option-letter {
    border-color: var(--check-fill);
    color: var(--check-fill);
    background: var(--check-bg);
  }

  .quiz-option.incorrect .quiz-option-letter {
    border-color: #ef4444;
    color: #ef4444;
  }

  .quiz-explanation {
    margin-top: 0.75rem;
    padding: 0.75rem 1rem;
    background: var(--item-hover);
    border-radius: 3px;
    font-size: 12px;
    font-weight: 300;
    line-height: 1.7;
    color: var(--accent);
    display: none;
  }

  .quiz-explanation.visible {
    display: block;
  }

  .quiz-chart-placeholder {
    width: 100%;
    height: 200px;
    border: 1px dashed var(--border);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 12px;
    background: var(--code-bg);
    margin-bottom: 1rem;
  }

  .quiz-open-response {
    width: 100%;
    min-height: 80px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.75rem 1rem;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 300;
    color: var(--fg);
    resize: vertical;
    line-height: 1.7;
  }

  .quiz-open-response:focus {
    outline: none;
    border-color: var(--center-fill);
  }

  .quiz-submit-btn {
    font-family: var(--font);
    font-size: 12px;
    font-weight: 400;
    background: var(--center-fill);
    color: #fff;
    border: 1px solid var(--center-fill);
    border-radius: 3px;
    padding: 0.75rem 1.5rem;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 1.5rem;
  }

  .quiz-submit-btn:hover {
    opacity: 0.9;
  }

  .quiz-submit-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .quiz-results {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1.5rem;
    margin-top: 1.5rem;
    text-align: center;
  }

  .quiz-score {
    font-size: 32px;
    font-weight: 500;
    color: var(--fg);
    margin-bottom: 0.5rem;
  }

  .quiz-score.passing {
    color: var(--check-fill);
  }

  .quiz-score.failing {
    color: #ef4444;
  }

  .quiz-results-text {
    font-size: 13px;
    font-weight: 300;
    color: var(--accent);
    line-height: 1.7;
  }

  .quiz-retry-btn {
    font-family: var(--font);
    font-size: 12px;
    font-weight: 400;
    color: var(--accent);
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    margin-top: 1rem;
  }

  .quiz-retry-btn:hover {
    color: var(--hover);
    border-color: var(--accent);
  }

  /* ─── Locked Module Page ─── */
  .locked-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 40vh;
    text-align: center;
    color: var(--muted);

        content: `To trade effectively, you need a basic understanding of what a financial market actually is and what happens when you click "buy" or "sell." This lesson covers the essentials — nothing more than what you need to move forward.

## What is a Market?

A market is simply a place where buyers and sellers come together to exchange something at an agreed-upon price. The stock market, the futures market, the forex market — they all follow this basic principle. A buyer wants to purchase at the lowest price possible. A seller wants to sell at the highest price possible. The current price is where these two sides meet.

## What are Futures?

A futures contract is an agreement to buy or sell something at a specific price on a future date. In our case, we trade NQ futures — contracts based on the NASDAQ-100 index. You don't need to own any stocks to trade NQ futures. You're simply speculating on whether the NASDAQ-100 will go up or down.

There are two contract sizes we care about:

**NQ (E-mini NASDAQ-100):** Each point of movement is worth **$20 per contract.** If NQ moves 10 points in your favor, you make $200 per contract.

**MNQ (Micro E-mini NASDAQ-100):** Each point is worth **$2 per contract.** This is 1/10th the size of NQ — ideal for learning and smaller accounts.

:::callout
WHY NQ FUTURES?
We trade NQ because it offers excellent volatility (it moves enough to make money), deep liquidity (orders fill instantly), and clean session structure (it respects the time-based patterns we'll learn). It's also the primary instrument for prop firm trading.
:::

## How Orders Work

When you place a trade, you're submitting an order. There are three types you need to know:

**Market Order:** Buy or sell immediately at the current price. You get filled instantly, but the exact price may differ slightly from what you see (this is called slippage).

**Limit Order:** Buy or sell at a specific price or better. If NQ is at 18,500 and you place a buy limit at 18,480, your order only fills if price drops to 18,480. You control the price, but you might not get filled.

**Stop Order:** An order that becomes a market order when a certain price is reached. Used primarily for stop-losses — automatic exits to limit your loss on a trade.

## The Bid-Ask Spread

At any moment, there are two prices displayed for NQ:

- **Bid:** The highest price a buyer is currently willing to pay
- **Ask:** The lowest price a seller is currently willing to accept

The difference between these two is the **spread.** On NQ during regular trading hours, the spread is typically 0.25 points (one tick). When you buy, you pay the ask. When you sell, you receive the bid. This means every trade starts slightly in the negative — you need price to move past the spread before you're in profit.

## What Moves Price?

This is where most trading education gets it wrong. The retail narrative says price moves because of "supply and demand" or "buying and selling pressure." While technically true at a micro level, this explanation misses the critical reality: **price delivery in financial markets is governed by algorithms.**

We'll go deep into this in Module 03. For now, just plant this seed: the market is not random, it is not purely driven by human emotion, and understanding the logic behind price movement is what separates traders who consistently profit from those who consistently donate.

        content: `The candlestick is the fundamental unit of a price chart. Every concept in this curriculum — structure, liquidity, FVGs, order blocks — is built on top of candlesticks. If you can't read a candle, you can't read the market. This lesson is non-negotiable.

## Anatomy of a Candlestick

Every candlestick represents price movement over a specific period of time. A candle on a 5-minute chart represents 5 minutes of trading. A candle on the daily chart represents one full trading day. Regardless of the timeframe, every candle records exactly four data points:

**Open:** The price at the beginning of the period
**High:** The highest price reached during the period
**Low:** The lowest price reached during the period
**Close:** The price at the end of the period

These four values — **OHLC** — are everything. Every candle, every chart, every pattern is built from these four numbers.

![diagram](Annotated candlestick showing Open, High, Low, Close with the body and wicks clearly labeled)

## The Body

The **body** of the candle is the filled rectangle between the open and the close. It tells you the net direction of price during that period.

- If the **close is above the open**, the candle is **bullish** (price went up). Typically colored green, blue, or white.
- If the **close is below the open**, the candle is **bearish** (price went down). Typically colored red, black, or filled dark.

The size of the body tells you about conviction. A large body means price moved decisively in one direction. A small body means there was indecision — buyers and sellers were fighting.

## The Wicks (Shadows)

The thin lines extending above and below the body are called **wicks** (or shadows). They represent the price range that was explored but not held.

**Upper wick:** Price went up to this level during the period but was pushed back down before the close. This represents **rejection of higher prices.**

**Lower wick:** Price went down to this level but was pushed back up before the close. This represents **rejection of lower prices.**

:::callout
KEY INSIGHT
Wicks tell you where price was rejected. The body tells you where price was accepted. A long lower wick on a bullish candle means sellers tried to push price down but buyers overwhelmed them. This is important information.
:::

## What a Candle Tells You

A single candlestick tells a story. Let's read a few:

**Large bullish candle with small wicks:** Buyers were in control from open to close. Strong bullish conviction. This is often part of displacement.

**Small body with long upper and lower wicks:** Neither side won. Indecision. The market is deciding its next move. Often seen during consolidation.

**Bullish candle with a long lower wick:** Price dropped significantly during the period but buyers stepped in and pushed it back up past the open. Buyers showed strength at lower prices.

**Bearish candle with a long upper wick:** Price rallied during the period but sellers slammed it back down below the open. Sellers showed strength at higher prices.

## A Word of Caution

Retail trading education obsesses over single-candle "patterns" — dojis, hammers, shooting stars, engulfing patterns. While these can be useful context clues, **they are unreliable in isolation.** A hammer at a random price level means nothing. A hammer at a discount order block during the NY killzone after a liquidity sweep — that means something.

Don't memorize candle patterns. Learn to read what the candle is telling you about who's in control — buyers or sellers — and where that battle is happening relative to the structure around it. That's what the rest of this curriculum teaches you.

![diagram](Four example candles side by side: large bullish, small doji, bullish with long lower wick, bearish with long upper wick — each with a one-line caption explaining what it shows)`

A timeframe determines how much time each candlestick represents. The same price data looks completely different depending on the timeframe you choose — and understanding this is critical.

Here are the timeframes you'll use in this program:

:::steps
1. **Weekly (1W)** — Each candle = one week. Used for macro bias and long-term structure.
2. **Daily (1D)** — Each candle = one trading day. Used for daily bias and key level identification.
3. **4-Hour (4H)** — Each candle = 4 hours. Used for swing structure and higher-timeframe PD arrays.
4. **1-Hour (1H)** — Each candle = 1 hour. Your primary structure timeframe for intraday trading.
5. **15-Minute (15m)** — Used for identifying entry-level PD arrays and confirmation.
6. **5-Minute (5m)** — Your execution timeframe. This is where you pull the trigger.
:::

Here's the key concept: **every timeframe shows the same price action, just at different levels of detail.** A single bullish daily candle might contain 24 hourly candles, some bullish, some bearish, showing the internal back-and-forth that the daily candle summarizes.

Higher timeframes (HTF) — Weekly, Daily, 4H — show you the big picture: where is price going and what levels matter? Lower timeframes (LTF) — 1H, 15m, 5m — show you the fine detail: when and where exactly to enter a trade.

:::callout
THE RULE
The higher timeframe always wins. If the daily chart says bullish, a bearish signal on the 5-minute chart is just noise. Never fight the HTF narrative. You'll learn exactly how to read HTF-to-LTF alignment in Module 09.
:::

![diagram](The same 4-hour price move shown on the 1H, 15m, and 5m charts side by side, illustrating how one swing contains multiple candles at lower timeframes)

## Chart Types

We use **candlestick charts** exclusively. You may encounter line charts (only show closing prices) or bar charts (similar data to candles, different visual). Candlestick charts give us the most information in the most readable format. Everything in this curriculum assumes you're looking at candlesticks.

On TradingView, set up NQ with the following layout:

:::steps
1. Open TradingView and search for **NQ1!** (continuous NQ futures contract)
2. Set your chart to **candlestick** display
3. Use a **dark background** with clean colors (we recommend the default dark theme)
4. Set up a **multi-chart layout** with at least three panels: 1H, 15m, and 5m
5. Remove all default indicators. We want **clean charts** — just candles and your drawn levels.
:::

You'll add our indicator suite later. For now, the goal is to learn to read raw price action without any crutches.

## Essential Terminology

Here are terms you'll encounter throughout this curriculum. Bookmark this page — you'll reference it often.

**Bull / Bullish:** Expecting price to go up. A bullish candle closes above its open.

**Bear / Bearish:** Expecting price to go down. A bearish candle closes below its open.

**Long:** A trade that profits when price goes up. "Going long" = buying.

**Short:** A trade that profits when price goes down. "Going short" = selling.

**Bid:** The highest price a buyer is willing to pay right now.

**Ask:** The lowest price a seller is willing to accept right now.

**Spread:** The difference between bid and ask.

**Tick:** The smallest price increment. On NQ, one tick = 0.25 points = $5.00 per contract.

**Point:** One full point on NQ = 4 ticks = $20 per contract (NQ) or $2 per contract (MNQ).

**HTF (Higher Timeframe):** Weekly, Daily, 4H — used for directional bias.

**LTF (Lower Timeframe):** 1H, 15m, 5m — used for entry timing and execution.

**Price Action:** The movement of price over time as displayed on a chart. We analyze price action — not indicators.

**Support / Resistance (Retail Definition):** Levels where price has historically bounced. We include this definition because you'll hear these terms everywhere, but we'll redefine what true support and resistance actually is in later modules. Spoiler: it's not horizontal lines on a chart.

:::callout
A NOTE ON RETAIL CONCEPTS
We're teaching you the standard vocabulary here so you understand what most traders are talking about. But a core thesis of this program is that retail concepts (trendlines, support/resistance, chart patterns) are incomplete at best and traps at worst. Starting in Module 03, we'll show you what's actually driving price — and it will change how you see every chart.
:::

You now have the foundation. You can read a candle, understand what timeframes show you, and speak the basic language of trading. In Module 02, we build on this with the most important skill in all of trading: reading market structure.`

        content: `Market structure is the single most important concept in trading. If you take nothing else from this curriculum, take this: **learn to read structure, and you'll always know where you are on a chart.**

Price doesn't move in a straight line. It moves in **swings** — up, down, up, down — creating a series of peaks and valleys. The relationship between these peaks and valleys tells you who is in control: buyers or sellers.

## Bullish Market Structure

In a bullish market, price makes a pattern of:
- **Higher Highs (HH):** Each peak is higher than the previous peak
- **Higher Lows (HL):** Each valley is higher than the previous valley

This tells you buyers are in control. Every time sellers try to push price down, buyers step in at a higher level than before. The market is trending upward.

## Bearish Market Structure

In a bearish market, price makes a pattern of:
- **Lower Highs (LH):** Each peak is lower than the previous peak
- **Lower Lows (LL):** Each valley is lower than the previous valley

This tells you sellers are in control. Every time buyers try to push price up, sellers overwhelm them at a lower level than before. The market is trending downward.

## Ranging / Consolidation

When price is making roughly equal highs and equal lows — moving sideways within a range — neither side has control. The market is consolidating. This is the **accumulation** phase. A breakout in one direction is coming, but timing it requires the tools we'll learn in later modules.

![diagram](Three side-by-side panels showing bullish structure (HH/HL staircase), bearish structure (LH/LL staircase), and a consolidation range with equal highs and lows)

:::callout
WHY THIS MATTERS
Every single concept you'll learn — FVGs, order blocks, killzones, trade models — only works when you put it in the context of market structure. An order block in a bullish market means something completely different than the same pattern in a bearish market. Structure is the frame. Everything else is the painting.

        content: `Now that you understand the concept of market structure, you need a precise method for identifying swing points. We don't eyeball it — we use the **3-bar swing** method.

## Defining a Swing High

A **swing high** is formed by three consecutive candles where:
- The middle candle has the **highest high** of the three
- The candle to the left has a **lower high**
- The candle to the right has a **lower high**

The middle candle is the swing high. This is where a peak formed — price went up, reached a high point, and then came back down.

## Defining a Swing Low

A **swing low** is formed by three consecutive candles where:
- The middle candle has the **lowest low** of the three
- The candle to the left has a **higher low**
- The candle to the right has a **higher low**

The middle candle is the swing low. This is where a valley formed — price went down, reached a low point, and then came back up.

![diagram](Annotated 3-bar swing high and swing low, showing the middle candle as the pivot with lower highs on each side for swing high, and higher lows on each side for swing low)

## Why This Precision Matters

The 3-bar swing is not arbitrary. This is how the algorithm marks structure. When IPDA (the Interbank Price Delivery Algorithm, which we'll cover in Module 03) references "old highs" and "old lows," it's looking at these swing points. If you mark your swing points differently than the algorithm does, your analysis will be off.

:::callout
PRACTICE THIS
Open any NQ chart on the 1-hour timeframe. Go back 5 days. Mark every swing high and swing low using the 3-bar method. Don't rush. This is the most fundamental chart-reading skill you'll develop, and it needs to be automatic before you move forward.
:::

## Multiple Touches

Sometimes you'll see swing highs or lows that form at nearly the same price level. Two swing highs at the same level create **equal highs.** Two swing lows at the same level create **equal lows.** These are extremely important — they create concentrated pools of liquidity that the algorithm will target. We'll cover this in detail in Module 05.`

## Reading the Staircase

Connect your swing points and look at the pattern:

**Bullish trend:** You see a staircase going up. Each swing high is higher than the last (HH). Each swing low is higher than the last (HL). The staircase ascends from left to right.

**Bearish trend:** You see a staircase going down. Each swing high is lower than the last (LH). Each swing low is lower than the last (LL). The staircase descends from left to right.

**No trend (range):** The staircase is flat. Highs and lows are roughly at the same level. Price is moving sideways.

![diagram](1H NQ chart with swing points connected by lines showing a clear bullish staircase pattern: HH, HL, HH, HL)

## The Trend Exists on Every Timeframe

This is crucial: you might see a bullish trend on the 1-hour chart while the daily chart is bearish. This isn't a contradiction — it means the 1-hour is showing a pullback rally inside a larger daily downtrend.

**The higher timeframe trend takes priority.** If the daily chart says bearish, then bullish moves on the 1-hour chart are counter-trend rallies — not opportunities to go long (unless you're specifically scalping counter-trend, which is advanced and not recommended for newer traders).

:::callout
THE HIERARCHY
Weekly trend > Daily trend > 4H trend > 1H trend > 15m trend > 5m trend. When the higher timeframe and lower timeframe agree, you have alignment — and that's where the highest probability trades live.
:::

## What Breaks a Trend?

A bullish trend breaks when price makes a **lower low** — it takes out a previous swing low. This means buyers could no longer defend the level where they previously stepped in.

A bearish trend breaks when price makes a **higher high** — it takes out a previous swing high. This means sellers could no longer defend the level where they previously stepped in.

But not every break is the same. In the next two lessons, we'll distinguish between a **Break of Structure (BOS)** and a **Change of Character (CHoCH)** — this distinction is what separates beginners from competent traders.`

## Bullish BOS

In a bullish trend (HH, HL pattern), a bullish BOS happens when:
- Price breaks above a previous **swing high**
- This creates a new **higher high**
- The bullish trend is confirmed to continue

After a bullish BOS, you expect price to pull back and form a new **higher low** before continuing upward.

## Bearish BOS

In a bearish trend (LH, LL pattern), a bearish BOS happens when:
- Price breaks below a previous **swing low**
- This creates a new **lower low**
- The bearish trend is confirmed to continue

After a bearish BOS, you expect price to retrace and form a new **lower high** before continuing downward.

![diagram](Two panels: Left shows bullish BOS with price breaking above a swing high, labeled 'BOS — trend continues.' Right shows bearish BOS with price breaking below a swing low, labeled 'BOS — trend continues.')

## What BOS Tells You

BOS is a **continuation signal.** It tells you: the current trend is intact, the side in control is still in control, and you should be looking for trades in the direction of the trend.

- **Look for entries on the pullback.** After BOS, price often retraces to a PD array (we'll learn these in Module 06) before the next leg of the move.

:::callout

## CHoCH in a Bullish Trend

In a bullish trend, a CHoCH happens when:
- Price breaks below a previous **swing low**
- For the first time in the trend, we see a **lower low**
- This violates the HH/HL pattern and signals potential trend reversal

## CHoCH in a Bearish Trend

In a bearish trend, a CHoCH happens when:
- Price breaks above a previous **swing high**
- For the first time in the trend, we see a **higher high**
- This violates the LH/LL pattern and signals potential trend reversal

![diagram](Two panels: Left shows bullish trend with HH, HL, HH, HL then a break below the last HL labeled 'CHoCH — potential reversal.' Right shows bearish trend with LH, LL, LH, LL then a break above the last LH labeled 'CHoCH — potential reversal.')

## CHoCH vs. BOS — The Critical Distinction

This is one of the most important distinctions in this entire curriculum:

- **BOS** = break in the **direction** of the trend → continuation
- **CHoCH** = break **against** the trend → potential reversal

Both are breaks of a swing point. The difference is direction relative to the prevailing trend. If you're in a bullish trend and price breaks a swing high — that's BOS (continuation). If price breaks a swing low — that's CHoCH (reversal warning).

:::callout
IMPORTANT NUANCE
A CHoCH is a *warning*, not a *confirmation*. Not every CHoCH leads to a full reversal. Sometimes it's just a deeper pullback before the trend resumes. What turns a CHoCH into a confirmed reversal is **displacement** — a strong, impulsive move following the break. When CHoCH is accompanied by displacement, we call it a Market Structure Shift.
:::

## In Practice

When you spot a CHoCH:

:::steps
1. **Stop looking for trades in the old trend direction.** The CHoCH is telling you the old trend may be done.
2. **Wait for confirmation.** Look for displacement (consecutive large candles) following the CHoCH.
3. **If confirmed**, start looking for entries in the new direction using the PD arrays you'll learn in Module 06.
4. **If not confirmed** (price just chops around after the CHoCH), the trend may resume. Don't assume reversal without conviction.
:::`

## What is Displacement?

Displacement is a sudden, forceful move in price. On the chart, it appears as one or more large-bodied candles with minimal wicks, all moving aggressively in the same direction. Displacement means someone with serious capital just moved the market. In the ICT framework, this is the algorithmic footprint of institutional order flow.

## How to Identify an MSS

:::steps
1. Price is in a defined trend (bullish or bearish)
2. A swing point is broken against the trend (CHoCH)
3. The move through that swing point is impulsive — large candles, minimal wicks, clear displacement
4. This displacement typically creates a **Fair Value Gap** (you'll learn these in Module 06)
:::

When all three elements are present — trend, break against it, and displacement — you have a Market Structure Shift.

![diagram](A bullish trend that transitions into a bearish MSS: HH, HL, HH, then a sharp displacement candle breaks below the last HL with a visible FVG, labeled 'MSS — structure has shifted bearish')

After a confirmed MSS, you're now operating under a new trend assumption. The MSS level itself becomes a reference point:

- In a bullish-to-bearish MSS: the MSS level is now resistance. Price should stay below it. If it reclaims that level, the shift may have been false.
- In a bearish-to-bullish MSS: the MSS level is now support. Price should stay above it.

The MSS is where you start building your trade idea. You know the new direction. Now you need timing (Module 04), levels (Modules 05–07), and a trade model (Module 08) to execute.

:::callout
TYING IT TOGETHER
Market Structure is the backbone of everything we do. Here's the hierarchy: Swing Points → Trend Direction → BOS (continuation) or CHoCH (warning) → MSS (confirmed shift). If you can read this sequence on a chart, you can always answer the most important question in trading: which side am I on right now?

        content: `Everything you learned in Modules 01 and 02 was mechanical — how to read candles and identify structure. Now we go deeper. This module is about **why** price moves the way it does. And the answer is going to challenge everything most traders believe.

## The Retail Narrative

Standard trading education teaches this: Price moves because of buying and selling pressure. When there are more buyers than sellers, price goes up. When there are more sellers than buyers, price goes down. Supply and demand.

This isn't wrong exactly — it's just incomplete to the point of being useless. It describes what happens at the micro level of order matching but tells you nothing about **why** price goes to specific levels, **why** it reverses at specific times, or **why** the same patterns play out across every market, every day.

## The Reality

Price in financial markets is delivered by an algorithm. Not metaphorically. Literally. The major financial exchanges use sophisticated algorithms to match orders, manage liquidity, and deliver price to institutions and banks worldwide.

In the ICT framework, this algorithm is called **IPDA — the Interbank Price Delivery Algorithm.** IPDA doesn't trade randomly. It follows a logic — a set of rules that determine where price goes, when, and why.

:::callout
DOES THIS MEAN MARKETS ARE "RIGGED"?
No — at least not in the way conspiracy theorists mean. Markets are *structured*. The algorithm has a job: facilitate efficient price delivery and ensure liquidity. Understanding its logic doesn't guarantee profits, but it does give you a framework for reading price that is vastly superior to retail technical analysis.
:::

## Why This Changes Everything

If price movement is algorithmic rather than purely random or emotional, then:

- Price going to specific levels isn't coincidence — it's by design
- Patterns that "fail" aren't actually failing — they're doing exactly what they were designed to do (engineer liquidity)
- Certain times of day see consistent behavior because the algorithm operates on a schedule
- You can learn to read the algorithm's footprints in price action

This is what this entire curriculum is built on. Every concept you'll learn — FVGs, order blocks, killzones, liquidity sweeps — is a tool for reading the algorithm's behavior. You're not predicting the future. You're reading the present with informed context.`

        content: `Let's get specific about what IPDA does and how it operates.

## IPDA's Two Jobs

IPDA has two primary objectives:

:::steps
1. **Engineer liquidity** by manipulating price to trigger resting orders above old highs and below old lows
2. **Offer fair value** by returning to areas where price was delivered inefficiently (one-sided)
:::

That's it. Every move you see on a chart is IPDA either seeking liquidity or rebalancing inefficient price delivery. When you can identify which of these two things is happening, you can anticipate where price is going next.

## The Market Efficiency Paradigm

IPDA operates within what ICT calls the **Market Efficiency Paradigm.** This is the relationship between two groups:

**Smart Money (Liquidity Providers):** Banks, institutions, and large fund managers who understand how the algorithm works. They don't chase price — they position themselves where the algorithm will deliver price to them.

**Speculative / Uninformed Money (Retail):** Individual traders who use retail technical analysis, follow indicators, and place predictable stop-loss orders. They provide the liquidity that Smart Money needs.

IPDA is the bridge between these two groups. It takes liquidity from retail traders (via stop hunts and inducements) and delivers it to institutional positions.

![diagram](Market Efficiency Paradigm: Smart Money connected through IPDA to Speculative Uninformed Money. Labels: 'Liquidity Provider' on left, 'Willing and/or Unwilling Liquidity' on right)

:::callout
THE UNCOMFORTABLE TRUTH
As a retail trader, you are — by default — on the wrong side of this dynamic. The entire purpose of this program is to move you from the right side of that diagram (uninformed money) to thinking like the left side (smart money). You'll never have their capital, but you can read the same footprints they leave.
:::

## Liquidity: The Fuel for Every Move

IPDA needs liquidity to function. Liquidity exists wherever there are resting orders — stop losses, take profits, pending limit orders. The most concentrated liquidity sits:

- **Above old swing highs:** Retail traders who are short have their stop-loss orders (buy stops) above previous highs. Retail breakout traders have their entry orders here too.
- **Below old swing lows:** Retail traders who are long have their stop-loss orders (sell stops) below previous lows. Retail breakdown traders have their entries here.

IPDA will move price to these levels to trigger these orders, providing the liquidity that institutions need to fill their positions. This is not theory — this is observable on every chart, every day.

## Fair Value: The Return Trip

When IPDA moves price aggressively in one direction, it sometimes moves too fast — leaving areas where only buying or only selling occurred (not both). These areas are **inefficient** — they don't represent fair value because only one side of the market was served.

IPDA will return to these areas to offer fair value to the other side. These inefficient areas are called **Fair Value Gaps (FVGs)**, and they're one of the most powerful tools in your arsenal. You'll learn exactly how to identify and trade them in Module 06.`

        content: `The AMD cycle is the core pattern of how IPDA delivers price. It happens on every timeframe — from the 1-minute chart to the weekly chart. Once you see it, you can't unsee it.

## Phase 1: Accumulation

IPDA holds price in a **consolidation range.** During this phase, retail traders are placing orders on both sides of the range:

- **Buy stops** accumulate above the range (from retail shorts and breakout buyers)
- **Sell stops** accumulate below the range (from retail longs and breakdown sellers)

The longer price stays in the range, the more liquidity builds on both sides. IPDA is essentially setting the table.

On the chart, accumulation looks like: tight range, small candles, choppy price action. Retail traders see this and get bored. Smart money sees this and gets ready.

## Phase 2: Manipulation

IPDA breaks out of the range — but in the **wrong** direction. This is the trap.

If the real move is going to be bullish, IPDA first spikes price **below** the accumulation range, triggering the sell stops. This:
- Stops out retail longs (who had stops below the range)
- Activates breakout shorts (who sell the "breakdown")
- Provides liquidity for Smart Money to fill buy orders at discount prices

This fake move is called the **Judas Swing** — named for its deceptive nature.

## Phase 3: Distribution

After the manipulation phase has provided the liquidity Smart Money needs, the **real move** begins. IPDA distributes price in the intended direction — aggressively.

Using the bullish example: after sweeping the sell stops below the range, price reverses hard and blasts through the top of the accumulation range, running the buy stops above it. Smart Money is distributing (selling) their long positions to the willing buyers (buy stops) above the range.

![diagram](Full AMD cycle shown in three phases: 1) Price consolidating in a range with BSL above and SSL below labeled, 2) Price spiking below the range sweeping SSL (Judas Swing), 3) Price reversing and expanding above the range through BSL)

:::callout
AMD IS FRACTAL
The AMD cycle happens on every timeframe. The daily candle follows AMD (midnight open → manipulation → expansion → close). The weekly candle follows AMD. Even a single trading session follows AMD (Asian consolidation → London manipulation → NY distribution). Once you understand this, you start seeing the same pattern everywhere.
:::

## How to Use AMD

You don't trade the accumulation phase — there's no edge in a range. You don't chase the manipulation phase — that's the trap. You trade the **distribution phase** — after the manipulation has occurred and the real move begins.

The question is: how do you know when manipulation is ending and distribution is beginning? The answer: **Market Structure Shift.** When the Judas Swing creates a CHoCH with displacement (MSS), that's your signal that manipulation is complete and the real move is underway.

AMD + MSS + the tools from Modules 04–07 = your trade.`

## The Patterns You've Been Taught

If you've studied any trading education before this, you've probably learned about:
- Trendlines
- Support and resistance levels
- Head and shoulders patterns
- Double tops and double bottoms
- Bull flags, bear flags
- Triangles, wedges, channels

These patterns are real — they do appear on charts. But they don't work the way retail education teaches. They're not predictive signals. They're **liquidity engineering tools.**

## How the Algorithm Uses Retail Patterns

Every retail pattern teaches traders to place their stops in predictable locations:

**Support level:** Retail traders go long at support with stops just below. This creates a **sell stop liquidity pool** just below the level.

**Double bottom:** Retail traders go long with stops below the equal lows. This creates an even thicker sell stop pool.

**Trendline:** Retail traders go long at the trendline with stops just below. Again — predictable liquidity.

**Bull flag:** Retail traders buy the "breakout" with stops at the bottom of the flag.

In every case, the pattern teaches retail traders to cluster their stops at obvious levels. And IPDA's job is to seek those stops.

:::callout
THE QUESTION THAT CHANGES EVERYTHING
Every time you look at a chart, stop asking: "What pattern do I see?" Start asking: **"Where are the retail stops?"** This single shift in thinking will change your trading forever. Where the stops are is where price is going — because that's where the liquidity is.
:::

## An Example

The retail trader says: "Support broke, then it came right back. So frustrating."

The Smart Money trader says: "Liquidity swept. Long from 18,480."

Same chart. Completely different understanding.

You don't need to abandon every retail concept — some of them (like candlestick reading and basic structure) are genuinely useful. But you need to understand that chart patterns are not trading signals. They are maps of where liquidity is being built.

Your edge comes from being on the **same side as the algorithm** — not fighting it by placing your stops where everyone else does.

In Modules 04 through 08, you'll learn exactly how to do this: identify where liquidity sits, anticipate when it will be taken, and position yourself to profit from the move that follows.`

## The IPDA True Day

The algorithm's active daily range runs from **12:00 AM EST (midnight) to 3:00 PM EST.** This 15-hour window is where the vast majority of meaningful price delivery occurs. The period outside this window — from 3:00 PM to midnight — is considered **dead time.** Price action during dead time is less predictable and often just noise.

## The Midnight Opening Price

The price at **12:00 AM EST (midnight New York time)** is the **true daily opening price.** This is not an arbitrary choice — it's the price the algorithm uses as its reference for the day.

Why does this matter? Because of Power of 3 (which you'll learn in Module 08):

- On a **buy day**, price will trade **below** the midnight open (manipulation) before expanding **above** it (distribution)
- On a **sell day**, price will trade **above** the midnight open (manipulation) before expanding **below** it (distribution)

The midnight open is your anchor. It tells you whether the day's manipulation has already occurred and which side of it you should be trading on.

## The Four Killzones (All Times EST)

**Asia Session: 8:00 PM – 12:00 AM**
This is the consolidation/accumulation phase. Price typically forms a tight range. Liquidity builds above and below the Asian range. You generally **do not trade during Asia** — you observe it to see where the range forms. The Asian range high and low become reference levels for the London and NY sessions.

**London Session: 2:00 AM – 5:00 AM**
London is where the first major move of the day often occurs. This is frequently the **manipulation phase** — the Judas Swing. London will often sweep one side of the Asian range, triggering stops, before reversing. If you trade FX pairs, London is a primary killzone. For NQ futures, London sets the stage for NY.

**New York Session: 7:00 AM – 10:00 AM**
This is the primary killzone for NQ futures. The highest volume and largest price moves of the day typically occur here. For intraday NQ traders, this is your session. This is where you execute.

**London Close: 10:00 AM – 12:00 PM**
London Close often brings a retracement or reversal of the NY session's move. Profit-taking and position squaring by London-based traders create opportunities. This is a secondary killzone — useful but less reliable than the NY open.

## Futures-Specific Timing

For NQ futures, the most important windows are:

:::steps
1. **AM Session: 8:30 AM – 12:00 PM EST** — Your primary trading window. This includes the cash market open (9:30 AM) and the high-probability 09:50-10:10 macro window.
2. **PM Session: 1:30 PM – 4:00 PM EST** — Secondary window. Often sees continuation or reversal of the AM session move. Less reliable, more suited for experienced traders.
:::

## Classic Buy Day

The daily candle opens near its low and closes near its high. During the session:
- Asian session consolidates
- London or early NY sweeps the low (manipulation/Judas Swing)
- Price reverses and expands higher through the NY session
- Closes near the high of the day

The midnight open is near the bottom of the candle. Your entry is at or below the midnight open during the manipulation phase.

## Classic Sell Day

The daily candle opens near its high and closes near its low. During the session:
- Asian session consolidates
- London or early NY pushes to the high (manipulation/Judas Swing)
- Price reverses and expands lower through the NY session
- Closes near the low of the day

The midnight open is near the top of the candle. Your entry is at or above the midnight open during the manipulation phase.

## London Swing to NY Reversal

London makes a strong directional move. NY session reverses it. This is common when London's move was the manipulation phase and NY is the distribution. You'd look to trade the NY reversal after London's move takes out key liquidity.

## Range Day into NY Expansion

Price ranges through Asia and London. The expansion happens during the NY session — often triggered by a news release (8:30 AM data or 10:00 AM data). On these days, the AM session is where the real move starts.

## Consolidation Raid on News Release

Price consolidates ahead of a major news event, then spikes violently in one direction to sweep liquidity before reversing. This is the AMD cycle compressed into a few minutes. Extremely common on CPI, NFP, and FOMC days.

![diagram](Four day-type templates shown as simple OHLC profiles: Classic Buy Day, Classic Sell Day, London Swing to NY Reversal, Range to NY Expansion — each with labeled phases and the midnight open marked)

:::callout
YOU DON'T NEED TO PREDICT THE DAY TYPE
You don't need to know in advance whether it's a buy day or sell day. What you need is to recognize which phase you're in as the session unfolds. If the manipulation phase has just occurred (liquidity swept, MSS forming), you know the distribution is next. The day type reveals itself — you just need to read it in real time.

        content: `High-impact economic news events play a specific role in the IPDA framework. Understanding this role will save you from many unnecessary losses.

## News Doesn't Cause the Move

This is counterintuitive, but critical: **news does not cause price to move to a specific level.** IPDA already has its targets — the liquidity pools and FVGs it wants to reach. What news provides is the **volatility and cover** for IPDA to reach those targets quickly.

Think of it this way: IPDA knows it wants to sweep the sell stops below yesterday's low. It could grind there over several hours — or it could use the CPI release at 8:30 AM to get there in 30 seconds. The destination is the same; the news just accelerates the journey.

## Key Economic Events for NQ

These are the high-impact events that affect NQ futures most:

:::steps
1. **CPI (Consumer Price Index)** — Released monthly, usually at 8:30 AM EST. Major volatility.
2. **NFP (Non-Farm Payrolls)** — First Friday of each month, 8:30 AM EST. Massive volatility.
3. **FOMC (Federal Reserve Interest Rate Decision)** — Released 8 times per year, 2:00 PM EST. Typically the highest-volatility event of the month.
4. **PPI, Retail Sales, GDP** — Other significant releases, usually at 8:30 AM EST.
5. **Fed Chair Press Conferences** — After FOMC decisions, usually 2:30 PM EST. Can be more impactful than the decision itself.
:::

## Manual Intervention

During the most significant events — particularly FOMC decisions — **manual intervention** can occur. This is where normal IPDA parameters can be temporarily overridden at the central bank level. Price may move in ways that don't follow the normal algorithmic patterns. This is why FOMC days are dangerous for mechanical trading.

## How to Trade Around News

**Before the release:** Do not enter new positions within 30 minutes of a high-impact release. If you're already in a trade, consider tightening your stop or closing before the event.

**During the release:** The initial spike is almost always the manipulation. Don't chase it. Let the dust settle.

**After the release:** Wait for a clear MSS or liquidity sweep post-news. The real move usually becomes clear within 15-30 minutes after the initial volatility.

:::callout
WHEN TO SIT OUT ENTIRELY
There are days when the best trade is no trade. FOMC decision days, NFP days (unless you have significant experience), half-trading days before holidays, and any day where you haven't done your pre-market analysis. Protecting your capital on uncertain days is not cowardice — it's professional.
:::

## Using the Economic Calendar

Check the economic calendar before every session. We recommend ForexFactory (forexfactory.com/calendar) or TradingView's built-in economic calendar. Filter for **high-impact events** (red flag on ForexFactory) affecting USD. Know what's coming before you open a chart.

With time and sessions covered, you now know WHAT drives price (the algorithm), WHEN it acts (killzones and sessions), and the general template of HOW daily price action unfolds. In Module 05, we dive into the WHERE — the specific price levels where liquidity pools form and IPDA targets them.`

// ─── Markdown Renderer ───
function renderMarkdown(text) {
  let html = '';
  const lines = text.split('\n');
  let i = 0;
  let inParagraph = false;

  function closeParagraph() {
    if (inParagraph) { html += '</p>'; inParagraph = false; }
  }

  function inlineFormat(str) {
    // Bold
    str = str.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    str = str.replace(/\*(.+?)\*/g, '<em>$1</em>');
    return str;
  }

  while (i < lines.length) {
    const line = lines[i].trim();

    // Empty line — close paragraph
    if (line === '') {
      closeParagraph();
      i++;
      continue;
    }

    // Callout block
    if (line === ':::callout' || line.startsWith(':::callout')) {
      closeParagraph();
      i++;
      // First line after :::callout is the title
      let title = '';
      let body = '';
      if (i < lines.length) {
        title = lines[i].trim();
        i++;
      }
      while (i < lines.length && lines[i].trim() !== ':::') {
        body += (body ? ' ' : '') + lines[i].trim();
        i++;
      }
      if (i < lines.length) i++; // skip closing :::
      html += `<div class="callout"><div class="callout-label">${title}</div><p>${inlineFormat(body)}</p></div>`;
      continue;
    }

    // Steps block
    if (line === ':::steps' || line.startsWith(':::steps')) {
      closeParagraph();
      i++;
      html += '<div class="steps">';
      while (i < lines.length && lines[i].trim() !== ':::') {
        const stepLine = lines[i].trim();
        if (stepLine === '') { i++; continue; }
        // Strip leading number + period
        const stepText = stepLine.replace(/^\d+\.\s*/, '');
        html += `<div class="step"><div class="step-content"><p>${inlineFormat(stepText)}</p></div></div>`;
        i++;
      }
      if (i < lines.length) i++; // skip closing :::
      html += '</div>';
      continue;
    }

    // Heading h2
    if (line.startsWith('## ')) {
      closeParagraph();
      html += `<h2>${inlineFormat(line.slice(3))}</h2>`;
      i++;
      continue;
    }

    // Heading h3
    if (line.startsWith('### ')) {
      closeParagraph();
      html += `<h3>${inlineFormat(line.slice(4))}</h3>`;
      i++;
      continue;
    }

    // Image/diagram placeholder
    if (line.startsWith('![diagram](')) {
      closeParagraph();
      const desc = line.match(/!\[diagram\]\((.+?)\)/);
      const caption = desc ? desc[1] : 'Diagram';
      html += `<div class="img-placeholder">${caption}</div>`;
      i++;
      continue;
    }

    // Unordered list item
    if (line.startsWith('- ')) {
      closeParagraph();
      html += '<ul>';
      while (i < lines.length && lines[i].trim().startsWith('- ')) {
        html += `<li>${inlineFormat(lines[i].trim().slice(2))}</li>`;
        i++;
      }
      html += '</ul>';
      continue;
    }

    // Regular paragraph line
    if (!inParagraph) {
      html += '<p>';
      inParagraph = true;
    } else {
      html += ' ';
    }
    html += inlineFormat(line);

    // Peek ahead — if next line is empty or a block element, close paragraph
    const nextLine = (i + 1 < lines.length) ? lines[i + 1].trim() : '';
    if (nextLine === '' || nextLine.startsWith('##') || nextLine.startsWith(':::') || nextLine.startsWith('![') || nextLine.startsWith('- ')) {
      closeParagraph();
    }

    i++;
  }
  closeParagraph();
  return html;
}

// ─── Helpers ───
function getUnlockedModules() {
  // All non-locked modules are accessible
  return CURRICULUM.filter(m => !m.locked && !m.comingSoon);
}

function getTotalActiveLessons() {
  return CURRICULUM.reduce((sum, m) => sum + m.lessons.length, 0);
}

function getFlatIndex(mi, li) {
  let idx = 0;
  for (let i = 0; i < mi; i++) idx += CURRICULUM[i].lessons.length;
  return idx + li;
}

function getPositionFromFlat(flat) {
  let count = 0;
  for (let mi = 0; mi < CURRICULUM.length; mi++) {
    for (let li = 0; li < CURRICULUM[mi].lessons.length; li++) {
      if (count === flat) return { module: mi, lesson: li };
      count++;
    }
  }
  return { module: 0, lesson: 0 };
}

function getLastActiveFlatIndex() {
  let total = 0;
  for (let mi = 0; mi < CURRICULUM.length; mi++) {
    total += CURRICULUM[mi].lessons.length;
  }
  return total - 1;
}

          <span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${lesson.readingTime} min read
          </span>
          <span>Lesson ${lesson.globalNum} of ${TOTAL_LESSONS}</span>
        </div>
      </div>

      <div class="lesson-body">
        ${renderMarkdown(lesson.content)}
      </div>

      <div class="lesson-nav">
        ${flat > 0 ? `<button class="lesson-nav-btn" onclick="goToPrev()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          Previous
        </button>` : '<div></div>'}

        <button class="complete-btn${isCompleted ? ' is-completed' : ''}" onclick="toggleComplete()">
          ${isCompleted ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Completed' : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/></svg> Mark Complete'}
        </button>

        ${flat < lastFlat ? `<button class="lesson-nav-btn primary" onclick="goToNext()">
          Next
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>` : '<div></div>'}
      </div>
    </div>
  `;

  document.getElementById('mainContent').scrollTo(0, 0);
}

function renderLockedContent(mod) {
  const wrap = document.getElementById('contentWrap');
  wrap.innerHTML = `
    <div class="fade-in">
      <div class="locked-content">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <h2>${mod ? mod.title : 'Locked'}</h2>
        <p>${mod && mod.subtitle ? mod.subtitle : 'This module is coming soon.'}</p>
        <p style="margin-top:0.5rem;">Content for this module will be available in a future update.</p>
      </div>
    </div>
  `;
}

// ─── Update Progress ───
function updateProgress() {
  const total = getTotalActiveLessons();
  const done = completedLessons.size;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = pct + '%';
}

// ─── Navigation ───
function goToLesson(mi, li) {
  currentView = { type: 'lesson', module: mi, lesson: li };
  saveProgress();
  renderSidebar();
  renderContent();
  updateProgress();
  document.getElementById('sidebar').classList.remove('open');
  document.querySelector('.sidebar-overlay').classList.remove('open');
}

function goToNext() {
  const flat = getFlatIndex(currentView.module, currentView.lesson);
  const lastFlat = getLastActiveFlatIndex();
  if (flat < lastFlat) {
    const pos = getPositionFromFlat(flat + 1);
    goToLesson(pos.module, pos.lesson);
  }
}

function goToPrev() {
  const flat = getFlatIndex(currentView.module, currentView.lesson);
  if (flat > 0) {
    const pos = getPositionFromFlat(flat - 1);
    goToLesson(pos.module, pos.lesson);
  }
}

function toggleComplete() {
  const mod = CURRICULUM[currentView.module];
  const lesson = mod.lessons[currentView.lesson];
  if (completedLessons.has(lesson.id)) {
    completedLessons.delete(lesson.id);
  } else {
    completedLessons.add(lesson.id);
  }
  saveProgress();
  renderSidebar();
  renderContent();
  updateProgress();
}

// ─── Mobile Sidebar ───
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.querySelector('.sidebar-overlay').classList.toggle('open');
}

// ─── Theme Toggle ───
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.getElementById('themeColor').setAttribute('content', next === 'dark' ? '#0a0a0a' : '#f0ede8');
  document.getElementById('themeBtn').textContent = next === 'dark' ? 'Light' : 'Dark';
  try { localStorage.setItem('dk-curriculum-theme', next); } catch(e) {}
}

// Load saved theme
try {
  const savedTheme = localStorage.getItem('dk-curriculum-theme');
  if (savedTheme) {
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('themeColor').setAttribute('content', savedTheme === 'dark' ? '#0a0a0a' : '#f0ede8');
    document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? 'Light' : 'Dark';
  }
} catch(e) {}

// ─── Keyboard Nav ───
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === 'j') goToNext();
  if (e.key === 'ArrowLeft' || e.key === 'k') goToPrev();
  if (e.key === 'e') toggleComplete();
});

// ─── Quiz State ───
let quizState = {}; // { moduleId: { answers: {qId: answerIndex}, submitted: bool, score: num } }
try {
  const savedQuiz = localStorage.getItem('dk-curriculum-quiz-v2');
  if (savedQuiz) quizState = JSON.parse(savedQuiz);
} catch(e) {}

function saveQuizState() {
  try { localStorage.setItem('dk-curriculum-quiz-v2', JSON.stringify(quizState)); } catch(e) {}
}

function getQuizState(modId) {
  if (!quizState[modId]) quizState[modId] = { answers: {}, submitted: false, score: 0 };
  return quizState[modId];
}

function isModulePassed(modId) {
  const qs = quizState[modId];
  return qs && qs.submitted && qs.score >= 80;
}

// ─── Quiz Rendering ───
function goToQuiz(mi) {
  currentView = { type: 'quiz', module: mi, lesson: 0 };
  saveProgress();
  renderSidebar();
  renderQuizContent(mi);
  updateProgress();
  document.getElementById('sidebar').classList.remove('open');
  document.querySelector('.sidebar-overlay').classList.remove('open');
}

function renderQuizContent(mi) {
  const mod = CURRICULUM[mi];
  if (!mod || !mod.quiz) return;
  const quiz = mod.quiz;
  const qs = getQuizState(mod.id);
  const recallQs = quiz.questions.filter(q => q.section === 'recall');
  const appliedQs = quiz.questions.filter(q => q.section === 'applied');
  const letters = ['A','B','C','D','E','F'];

  const wrap = document.getElementById('contentWrap');
  wrap.innerHTML = `
    <div class="fade-in">
      <div class="lesson-header">
        <div class="lesson-breadcrumb">Module ${mod.number} — ${mod.title.toUpperCase()}</div>
        <h1 class="lesson-title">${quiz.title}</h1>
        <div class="lesson-meta">
          <span>Passing score: ${quiz.passingScore}%</span>
          <span>${quiz.questions.length} questions</span>
        </div>
      </div>

      <div class="lesson-body quiz-container" id="quizContainer">
        ${recallQs.length ? '<div class="quiz-section-label">Recall Questions</div>' : ''}
        ${recallQs.map((q, qi) => renderQuizQuestion(q, qi, qs, letters, 'R')).join('')}

        ${appliedQs.length ? '<div class="quiz-section-label">Applied Questions</div>' : ''}
        ${appliedQs.map((q, qi) => renderQuizQuestion(q, qi + recallQs.length, qs, letters, 'A')).join('')}

        <div id="quizActions">
          ${qs.submitted ? renderQuizResults(mod, qs, quiz) : `<button class="quiz-submit-btn" id="quizSubmitBtn" onclick="submitQuiz(${mi})">Submit Quiz</button>`}
        </div>
      </div>

      <div class="lesson-nav">
        <button class="lesson-nav-btn" onclick="goToLesson(${mi}, ${mod.lessons.length - 1})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          Back to Lessons
        </button>
        <div></div>
        <div></div>
      </div>
    </div>
  `;

  document.getElementById('mainContent').scrollTo(0, 0);
}

function renderQuizQuestion(q, idx, qs, letters, prefix) {
  const answered = qs.answers[q.id] !== undefined;
  const submitted = qs.submitted;

  if (q.type === 'chart_analysis') {
    return `
      <div class="quiz-question">
        <div class="quiz-question-number">${prefix}${idx + 1}</div>
        <div class="quiz-question-text">${q.question}</div>
        <div class="quiz-chart-placeholder">[Chart screenshot will be provided]</div>
        <textarea class="quiz-open-response" placeholder="Type your analysis here..." ${submitted ? 'disabled' : ''} oninput="quizTextAnswer('${q.id}', this.value)">${qs.answers[q.id] || ''}</textarea>
        <div class="quiz-explanation ${submitted ? 'visible' : ''}">${q.explanation}</div>
      </div>
    `;
  }

  if (q.type === 'multiple_choice' && q.options) {
    return `
      <div class="quiz-question">
        <div class="quiz-question-number">${prefix}${idx + 1}</div>
        <div class="quiz-question-text">${q.question}</div>
        <div class="quiz-options">
          ${q.options.map((opt, oi) => {
            let cls = 'quiz-option';
            if (submitted && oi === q.correctAnswer) cls += ' correct';
            else if (submitted && qs.answers[q.id] === oi && oi !== q.correctAnswer) cls += ' incorrect';
            else if (!submitted && qs.answers[q.id] === oi) cls += ' selected';
            return `<button class="${cls}" onclick="quizSelectAnswer('${q.id}', ${oi}, ${submitted})" ${submitted ? 'disabled' : ''}>
              <span class="quiz-option-letter">${letters[oi]}</span>
              <span>${opt}</span>
            </button>`;
          }).join('')}
        </div>
        <div class="quiz-explanation ${submitted ? 'visible' : ''}">${q.explanation}</div>
      </div>
    `;
  }

  return '';
}

function renderQuizResults(mod, qs, quiz) {
  const passed = qs.score >= quiz.passingScore;
  return `
    <div class="quiz-results">
      <div class="quiz-score ${passed ? 'passing' : 'failing'}">${qs.score}%</div>
      <div class="quiz-results-text">${passed
        ? 'You passed! The next module is now unlocked.'
        : `You need ${quiz.passingScore}% to pass. Review the lessons and try again.`}</div>
      ${!passed ? `<button class="quiz-retry-btn" onclick="retryQuiz(${CURRICULUM.indexOf(mod)})">Retry Quiz</button>` : ''}
    </div>
  `;
}

function quizSelectAnswer(qId, optionIndex, submitted) {
  if (submitted) return;
  const mi = currentView.module;
  const mod = CURRICULUM[mi];
  const qs = getQuizState(mod.id);
  qs.answers[qId] = optionIndex;
  saveQuizState();
  renderQuizContent(mi);
}

function quizTextAnswer(qId, value) {
  const mi = currentView.module;
  const mod = CURRICULUM[mi];
  const qs = getQuizState(mod.id);
  qs.answers[qId] = value;
  saveQuizState();
}

function submitQuiz(mi) {
  const mod = CURRICULUM[mi];
  const quiz = mod.quiz;
  const qs = getQuizState(mod.id);

  // Score: only count multiple_choice questions
  const mcQuestions = quiz.questions.filter(q => q.type === 'multiple_choice' && q.correctAnswer !== undefined);
  let correct = 0;
  mcQuestions.forEach(q => {
    if (qs.answers[q.id] === q.correctAnswer) correct++;
  });
  qs.score = mcQuestions.length > 0 ? Math.round((correct / mcQuestions.length) * 100) : 100;
  qs.submitted = true;
  saveQuizState();
  renderQuizContent(mi);
}

function retryQuiz(mi) {
  const mod = CURRICULUM[mi];
  quizState[mod.id] = { answers: {}, submitted: false, score: 0 };
  saveQuizState();
  renderQuizContent(mi);
}

// ─── Init ───
renderSidebar();
renderContent();
updateProgress();
</script>
</body>
</html>
